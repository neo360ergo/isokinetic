          ${hasFilters&&html`<button onClick=${clearFilters} style=${{marginTop:12,padding:"6px 16px",background:C.bg3,color:C.muted,border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer",fontSize:12}}>Καθαρισμός φίλτρων</button>`}
        <//>
      `:html`
        <${Card} style=${{padding:0}}>
          <div style=${{overflowX:"auto"}}>
            <table><thead><tr>
              <th>Όνομα</th><th>Ηλικία</th><th>Φύλο</th><th>Ομάδα</th><th>Άθλημα</th><th>ID</th><th>Βάρος</th><th>Status</th><th></th>
            </tr></thead>
            <tbody>${f.map(a=>html`
              <tr key=${a.id} style=${{cursor:"pointer"}} onClick=${()=>onSelect(a)}>
                <td style=${{fontWeight:600}}>${a.name}</td>
                <td class="muted">${a.dob?age(a.dob)+" ετών":"—"}</td>
                <td class="muted">${a.gender==="male"?"Άνδρας":a.gender==="female"?"Γυναίκα":"—"}</td>
                <td class="muted" style=${{fontSize:11}}>${_teams.find(t=>t.id===a.team_id)?.name||"—"}</td>
                <td class="muted">${a.sport||"—"}</td>
                <td class="muted" style=${{fontSize:11}}>${a.id_number||"—"}</td>
                <td class="muted">${a.weight_kg?a.weight_kg+"kg":"—"}</td>
                <td>${a.status==="claimed"?html`<${Bdg} txt="✓ Claimed" color="green"/>`:html`<${Bdg} txt="Virtual" color="muted"/>`}</td>
                <td style=${{color:C.accent,fontSize:18}}>›</td>
              </tr>
            `)}</tbody></table>
          </div>
        <//>
      `}
    </div>`;
}

// ── ATHLETE PROFILE ───────────────────────────────────────────────────────────
function AthleteProfile({athlete,onBack,onNewMeasurement,onNewMultiSpeed,onEdit,showToast,readOnly=false}){
  const [measurements,setMeasurements]=useState([]);
  const [selected,setSelected]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("history");
  const [deleting,setDeleting]=useState(null);

  const load=useCallback(async()=>{
    setLoading(true);
    try{const data=await db.get("measurements",`,test_results(*)&athlete_id=eq.${athlete.id}&order=test_date.desc`);setMeasurements(data||[]);}
    catch(e){console.error(e);}
    setLoading(false);
  },[athlete.id]);

  useEffect(()=>{load();},[load]);
  const toggle=(id)=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id].slice(-2));

  const deleteMeas=async(m)=>{
    if(!confirm(`Διαγραφή μέτρησης ${m.test_date};`))return;
    setDeleting(m.id);
    try{await db.del("measurements",m.id);setMeasurements(ms=>ms.filter(x=>x.id!==m.id));setSelected(s=>s.filter(x=>x!==m.id));showToast("Μέτρηση διαγράφηκε");}
    catch(e){showToast(e.message,"error");}
    setDeleting(null);
  };

  const a=age(athlete.dob);
  const tabs=[["history","Ιστορικό"],["analysis","Ανάλυση"],["clinical","✍️ Οδηγίες"],["trends","📈 Εξέλιξη"],["compare","Σύγκριση"],["multispeed","⚡ Multi-Speed"]];

  return html`
    <div>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <button onClick=${onBack} style=${{background:"none",color:C.muted,fontSize:12,padding:"4px 0",marginBottom:8,border:"none",cursor:"pointer"}}>← Πίσω</button>
          <div style=${{fontSize:22,fontWeight:700}}>${athlete.name}</div>
          <div style=${{color:C.muted,fontSize:13,marginTop:2}}>${[a&&a+" ετών",athlete.gender==="male"?"Άνδρας":athlete.gender==="female"?"Γυναίκα":null,athlete.weight_kg&&athlete.weight_kg+"kg",athlete.height_cm&&athlete.height_cm+"cm",athlete.sport].filter(Boolean).join(" · ")}</div>
          ${athlete.notes&&html`<div style=${{fontSize:12,color:C.muted,marginTop:4,fontStyle:"italic"}}>${athlete.notes}</div>`}
        </div>
        <div style=${{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <${Btn} onClick=${()=>exportExcel(athlete,measurements)} color=${C.bg3} textColor=${C.muted} style=${{fontSize:12}}>📊 Export Excel<//>
          ${!readOnly&&html`
            <${Btn} onClick=${onEdit} color=${C.bg3} textColor=${C.muted} style=${{fontSize:12}}>✏️ Επεξεργασία<//>
            <${Btn} onClick=${onNewMeasurement}>+ Νέα Μέτρηση<//>
            <${Btn} onClick=${onNewMultiSpeed} color=${"#1a5c3a"} style=${{fontSize:12}}>⚡ Multi-Speed<//>
          `}
        </div>
      </div>

      <div style=${{display:"flex",gap:4,marginBottom:20,borderBottom:`1px solid ${C.border}`}}>
        ${tabs.map(([v,l])=>html`<button key=${v} onClick=${()=>setTab(v)} style=${{padding:"8px 18px",background:"none",color:tab===v?C.accent:C.muted,borderBottom:tab===v?`2px solid ${C.accent}`:"2px solid transparent",border:"none",borderRadius:0,cursor:"pointer",fontWeight:tab===v?600:400}}>${l}</button>`)}
      </div>

      ${loading?html`<div style=${{textAlign:"center",padding:40}}><${Sp}/></div>`:html`
        ${tab==="history"&&html`
          <div>
            ${selected.length>0&&html`<div style=${{background:"rgba(79,142,247,0.08)",border:`1px solid ${C.accent}`,borderRadius:8,padding:"10px 16px",marginBottom:16,fontSize:12,color:C.accent}}>${selected.length===1?"1 μέτρηση επιλεγμένη — πάτα Ανάλυση":"2 μετρήσεις — πάτα Σύγκριση"}</div>`}
            ${measurements.length===0?html`<${Card} style=${{textAlign:"center",padding:40,color:C.muted}}><div style=${{fontSize:32,marginBottom:12}}>📊</div><div>Δεν υπάρχουν μετρήσεις.</div><//>`:html`
              <${Card} style=${{padding:0}}>
                <div style=${{overflowX:"auto"}}>
                  <table><thead><tr><th></th><th>Ημερομηνία</th><th>Άρθρωση</th><th>Πρωτόκολλο</th><th>°/s</th><th>Gravity</th><th>Πηγή</th><th>Σημειώσεις</th><th></th></tr></thead>
                  <tbody>${measurements.map(m=>html`
                    <tr key=${m.id}>
                      <td><input type="checkbox" checked=${selected.includes(m.id)} onChange=${()=>toggle(m.id)} style=${{width:"auto"}}/></td>
                      <td style=${{fontWeight:600}}>${m.test_date}</td>
                      <td style=${{textTransform:"capitalize"}}>${m.joint}</td>
                      <td><${Bdg} txt=${m.protocol} color="muted"/></td>
                      <td class="mono muted">${m.speed_deg_s}</td>
                      <td>${m.gravity_corrected?html`<span class="green">✓</span>`:html`<span class="red">✗</span>`}</td>
                      <td class="muted" style=${{fontSize:11}}>${m.source==="pdf_upload"?"PDF":"Manual"}</td>
                      <td class="muted" style=${{fontSize:11}}>${m.notes||"—"}</td>
                      <td style=${{whiteSpace:"nowrap"}}>
                        <button onClick=${()=>{setSelected([m.id]);setTab("analysis");}} style=${{background:C.bg3,color:C.accent,padding:"4px 10px",fontSize:11,border:"none",borderRadius:4,cursor:"pointer",marginRight:4}}>Ανάλυση</button>
                        <button onClick=${()=>deleteMeas(m)} disabled=${deleting===m.id} style=${{background:"rgba(242,95,92,0.1)",color:C.red,padding:"4px 10px",fontSize:11,border:"none",borderRadius:4,cursor:"pointer"}}>${deleting===m.id?html`<${Sp}/>`:""} 🗑</button>
                      </td>
                    </tr>
                  `)}</tbody></table>
                </div>
              <//>
            `}
          </div>
        `}
        ${tab==="analysis"&&html`<${AnalysisView} measurements=${measurements} selected=${selected} athlete=${athlete}/>`}
        ${tab==="clinical"&&html`
          <div>
            ${measurements.length===0?html`<${Card} style=${{textAlign:"center",padding:40,color:C.muted}}><div>Δεν υπάρχουν μετρήσεις.</div><//>`:html`
              <div style=${{marginBottom:16}}>
                <${Lbl} t="Επιλογή Μέτρησης"/>
                <select value=${selected[0]||measurements[0]?.id||""} onChange=${e=>setSelected([e.target.value])}>
                  ${measurements.map(m=>html`<option key=${m.id} value=${m.id}>${m.test_date} — ${m.joint} ${m.speed_deg_s}°/s ${m.notes?"("+m.notes+")":""}</option>`)}
                </select>
              </div>
              <${ClinicalNotesEditor}
                meas=${measurements.find(m=>m.id===(selected[0]||measurements[0]?.id))||measurements[0]}
                athlete=${athlete}
                an=${analyze((measurements.find(m=>m.id===(selected[0]||measurements[0]?.id))||measurements[0])?.test_results||[], athlete?.gender||"")}
                showToast=${showToast}
                onSaved=${(updated)=>setMeasurements(ms=>ms.map(m=>m.id===updated.id?{...m,...updated}:m))}
              />
            `}
          </div>
        `}
        ${tab==="trends"&&html`<${TrendCharts} measurements=${measurements}/>`}
        ${tab==="compare"&&html`<${CompareView} measurements=${measurements}/>`}
        ${tab==="multispeed"&&html`<${MultiSpeedAnalysis} measurements=${measurements} athlete=${athlete}/>`}
      `}
    </div>`;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("list");
  const [athlete,setAthlete]=useState(null);
  const [toast,setToast]=useState(null);
  const [showAdmin,setShowAdmin]=useState(false);
  const [session,setSession]=useState(_session);
  const [appUser,setAppUser]=useState(_appUser);
  const [authLoading,setAuthLoading]=useState(!!_session);

  // Verify session on mount
  useEffect(()=>{
    if(_session?.access_token){
      auth.getUser(_session.access_token).then(async u=>{
        if(!u){
          // Try refresh token
          if(_session?.refresh_token){
            try {
              const newSession = await auth.refreshToken(_session.refresh_token);
              saveSession(newSession);
              _session = newSession;
              setSession(newSession);
              const users = await db.get("app_users",`&auth_id=eq.${newSession.user?.id}`);
              _appUser = users?.[0]||null;
              setAppUser(_appUser);
            } catch(e) {
              saveSession(null);setSession(null);setAppUser(null);
            }
          } else {
            saveSession(null);setSession(null);setAppUser(null);
          }
        } else {
          if(!_appUser){
            const users = await db.get("app_users",`&auth_id=eq.${_session.user?.id||u.id}`);
            _appUser = users?.[0]||null;
            setAppUser(_appUser);
          }
        }
        setAuthLoading(false);
      }).catch(()=>{ saveSession(null);setSession(null);setAppUser(null);setAuthLoading(false); });
    } else setAuthLoading(false);
  },[]);

  const handleLogin=(session,appUser)=>{
    setSession(session);setAppUser(appUser);
    // If athlete role, go directly to their profile
    if(appUser?.athlete_id){
      db.get("athletes",`&id=eq.${appUser.athlete_id}`,",test_results(*)").then(d=>{
        if(d?.[0]){setAthlete(d[0]);setView("profile");}
      });
    }
  };

  const handleLogout=async()=>{
    if(_session?.access_token) await auth.signOut(_session.access_token);
    saveSession(null); _appUser=null; _session=null;
    setSession(null);setAppUser(null);setView("list");setAthlete(null);
  };

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  const isAthlete = appUser?.role==="athlete";
  const isPending = appUser?.role?.includes("_pending");

  if(authLoading) return html`<div style=${{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted}}><${Sp}/></div>`;
  if(!session) return html`<${LoginPage} onLogin=${handleLogin}/>`;
  if(isPending) return html`
    <div style=${{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style=${{textAlign:"center",maxWidth:400,padding:32}}>
        <div style=${{fontSize:48,marginBottom:16}}>⏳</div>
        <div style=${{fontSize:20,fontWeight:700,color:C.text,marginBottom:8}}>Αναμονή Έγκρισης</div>
        <div style=${{fontSize:13,color:C.muted,marginBottom:24}}>Ο λογαριασμός σου (${appUser?.role?.replace("_pending","")}) είναι υπό έγκριση από τον Admin. Θα ειδοποιηθείς μόλις εγκριθεί.</div>
        <button onClick=${handleLogout} style=${{padding:"10px 24px",background:C.bg3,color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer"}}>Αποσύνδεση</button>
      </div>
    </div>`;

  return html`
    <div style=${{minHeight:"100vh",background:C.bg}}>
      <${Navbar} athlete=${athlete} view=${view} onHome=${()=>{if(!isAthlete)setView("list");}} onAdmin=${()=>setShowAdmin(true)} onLogout=${handleLogout}/>
      <div style=${{maxWidth:1150,margin:"0 auto",padding:"28px 32px"}}>
        ${!isAthlete&&html`
          ${view==="list"&&html`<${AthleteList} onSelect=${a=>{setAthlete(a);setView("profile");}} onNew=${()=>setView("new")}/>`}
          ${view==="new"&&html`<${AthleteForm} onSave=${a=>{setAthlete(a);showToast("Αθλητής αποθηκεύτηκε");setView("profile");}} onCancel=${()=>setView("list")}/>`}
          ${view==="edit"&&athlete&&html`<${AthleteForm} athlete=${athlete} onSave=${a=>{setAthlete(a);showToast("Στοιχεία ενημερώθηκαν");setView("profile");}} onCancel=${()=>setView("profile")}/>`}
        `}
        ${view==="profile"&&athlete&&html`<${AthleteProfile} athlete=${athlete} onBack=${()=>isAthlete?null:setView("list")} onNewMeasurement=${()=>setView("meas")} onNewMultiSpeed=${()=>setView("multispeed")} onEdit=${()=>setView("edit")} showToast=${showToast} readOnly=${isAthlete}/>`}
        ${!isAthlete&&html`
          ${view==="meas"&&athlete&&html`<${MeasurementInput} athlete=${athlete} onSave=${()=>{showToast("Μέτρηση αποθηκεύτηκε");setView("profile");}} onCancel=${()=>setView("profile")}/>`}
          ${view==="multispeed"&&athlete&&html`<${MultiSpeedInput} athlete=${athlete} onSave=${()=>{showToast("Session αποθηκεύτηκε ✅");setView("profile");}} onCancel=${()=>setView("profile")}/>`}
        `}
      </div>
      <${Toast} msg=${toast?.msg} type=${toast?.type}/>
      ${showAdmin&&html`<${AdminPanel} onClose=${()=>setShowAdmin(false)} showToast=${showToast}/>`}
    </div>`;
}

render(h(App,null),document.getElementById("root"));
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d0f14;color:#e8eaf0;font-family:Inter,sans-serif;font-size:14px}
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
    input,select,textarea{background:#1a1e28;border:1px solid #252a38;color:#e8eaf0;border-radius:6px;padding:8px 12px;font-size:13px;font-family:Inter,sans-serif;width:100%;outline:none;box-sizing:border-box}
    input:focus,select:focus,textarea:focus{border-color:#4f8ef7}
    table{width:100%;border-collapse:collapse}
    th{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#6b7390;padding:7px 10px;text-align:left;border-bottom:1px solid #252a38}
    td{padding:8px 10px;font-size:13px;border-bottom:1px solid rgba(37,42,56,0.5)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(79,142,247,0.04)}
    .mono{font-family:'JetBrains Mono',monospace}
    .green{color:#3ecf8e}.yellow{color:#f5c842}.red{color:#f25f5c}.muted{color:#6b7390}.accent{color:#4f8ef7}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media print{body{background:white;color:black}}
  </style>
</head>
