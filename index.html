function analyze(results,gender=""){
  const r =results.find(x=>x.side==="right"&&x.muscle_group==="extensors");
  const l =results.find(x=>x.side==="left" &&x.muscle_group==="extensors");
  const rf=results.find(x=>x.side==="right"&&x.muscle_group==="flexors");
  const lf=results.find(x=>x.side==="left" &&x.muscle_group==="flexors");
  const flags=[];
  const lsi_ext=calcLSI(r?.peak_torque,l?.peak_torque);
  const lsi_flex=calcLSI(rf?.peak_torque,lf?.peak_torque);
  const lsi_work=calcLSI(r?.work_per_rep,l?.work_per_rep);
  const lsi_pwr=calcLSI(r?.avg_power,l?.avg_power);
  const hq_r=calcHQ(rf?.peak_torque,r?.peak_torque);
  const hq_l=calcHQ(lf?.peak_torque,l?.peak_torque);
  const norm=NORMS[gender]||null;
  [r,l,rf,lf].forEach(x=>{
    if(!x)return;
    const s=x.side==="right"?"Δεξί":"Αριστ.",g=x.muscle_group==="extensors"?"Εκτ.":"Κάμπτ.";
    if(x.pt_cov>0.25)flags.push({t:"red",m:`CoV PT ${s} ${g}: ${x.pt_cov} — Μη αξιόπιστο αποτέλεσμα`});
    else if(x.pt_cov>0.15)flags.push({t:"yellow",m:`CoV PT ${s} ${g}: ${x.pt_cov} — Μέτρια μεταβλητότητα`});
    if(x.rom_cov>0.30)flags.push({t:"yellow",m:`CoV ROM ${s} ${g}: ${x.rom_cov} — Ασταθής αρχική θέση`});
  });
  if(lsi_ext!=null&&lsi_ext<90)flags.push({t:lsi_ext<80?"red":"yellow",m:`LSI Εκτ.: ${lsi_ext}% — κατώφλι RTS 90%`});
  if(lsi_flex!=null&&lsi_flex<90)flags.push({t:lsi_flex<80?"red":"yellow",m:`LSI Κάμπτ.: ${lsi_flex}% — κατώφλι RTS 90%`});
  if(hq_r!=null&&hq_r<50)flags.push({t:"red",m:`H/Q Δεξί: ${hq_r}% — Κρίσιμα χαμηλό (φυσιολ. 55-65%)`});
  else if(hq_r!=null&&hq_r<55)flags.push({t:"yellow",m:`H/Q Δεξί: ${hq_r}% — Οριακά χαμηλό`});
  if(hq_l!=null&&hq_l<50)flags.push({t:"red",m:`H/Q Αριστ.: ${hq_l}% — Κρίσιμα χαμηλό`});
  else if(hq_l!=null&&hq_l<55)flags.push({t:"yellow",m:`H/Q Αριστ.: ${hq_l}% — Οριακά χαμηλό`});
  if(norm&&r?.pt_bw!=null&&r.pt_bw<norm.ext_bw[0])flags.push({t:"yellow",m:`%BW Εκτ. Δεξί: ${r.pt_bw}% — κάτω από norm (${norm.ext_bw[0]}-${norm.ext_bw[1]}%)`});
  if(norm&&l?.pt_bw!=null&&l.pt_bw<norm.ext_bw[0])flags.push({t:"yellow",m:`%BW Εκτ. Αριστ.: ${l.pt_bw}% — κάτω από norm`});
  return {lsi_ext,lsi_flex,lsi_work,lsi_pwr,hq_r,hq_l,flags,r,l,rf,lf,norm};
}

function rtsScore(an){
  const checks=[
    {label:"LSI PT Εκτ. ≥90%",pass:an.lsi_ext!=null&&an.lsi_ext>=90,val:an.lsi_ext!=null?an.lsi_ext+"%":"—"},
    {label:"LSI PT Κάμπτ. ≥90%",pass:an.lsi_flex!=null&&an.lsi_flex>=90,val:an.lsi_flex!=null?an.lsi_flex+"%":"—"},
    {label:"LSI Work ≥90%",pass:an.lsi_work!=null&&an.lsi_work>=90,val:an.lsi_work!=null?an.lsi_work+"%":"—"},
    {label:"LSI Power ≥90%",pass:an.lsi_pwr!=null&&an.lsi_pwr>=90,val:an.lsi_pwr!=null?an.lsi_pwr+"%":"—"},
    {label:"H/Q Δεξί ≥55%",pass:an.hq_r!=null&&an.hq_r>=55,val:an.hq_r!=null?an.hq_r+"%":"—"},
    {label:"H/Q Αριστ. ≥55%",pass:an.hq_l!=null&&an.hq_l>=55,val:an.hq_l!=null?an.hq_l+"%":"—"},
    {label:"CoV PT <0.15",pass:an.r?.pt_cov!=null&&an.r.pt_cov<0.15&&an.rf?.pt_cov!=null&&an.rf.pt_cov<0.15,val:an.r?.pt_cov??"-"},
  ];
  const passed=checks.filter(c=>c.pass).length;
  return {checks,passed,total:checks.length,pct:Math.round((passed/checks.length)*100)};
}

async function splitPDFToPages(base64) {
  // Set worker
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  const pdf = await pdfjsLib.getDocument({data:bytes}).promise;
  const numPages = pdf.numPages;
  if(numPages <= 1) return [base64]; // single page, return as-is

  // For each page, render to canvas and convert back to PDF-like base64
  // Actually: use PDF.js to extract page as image, or better:
  // Re-encode each page using pdf-lib approach
  // Simpler: return array of page indices for the API to handle
  return {numPages, base64, pageCount: numPages};
}

async function parsePDFPage(base64, pageHint="") {
  const prompt=`Extract isokinetic data from this Cybex HUMAC NORM report page${pageHint?` (${pageHint})`:""}. Return ONLY valid JSON, no markdown.
{"athlete_name":"","test_date":"YYYY-MM-DD","joint":"knee","protocol":"con_con","gravity_corrected":true,"speeds":[{"speed_deg_s":60,"reps":5,"results":[{"side":"right","muscle_group":"extensors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"avg_power":0,"power_cov":0,"rom":0,"rom_cov":0,"joint_angle_peak":0,"time_to_peak":0,"force_decay":0},{"side":"left","muscle_group":"extensors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"avg_power":0,"power_cov":0,"rom":0,"rom_cov":0,"joint_angle_peak":0,"time_to_peak":0,"force_decay":0},{"side":"right","muscle_group":"flexors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"avg_power":0,"power_cov":0,"rom":0,"rom_cov":0,"joint_angle_peak":0,"time_to_peak":0,"force_decay":0},{"side":"left","muscle_group":"flexors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"avg_power":0,"power_cov":0,"rom":0,"rom_cov":0,"joint_angle_peak":0,"time_to_peak":0,"force_decay":0}]}]}`;
  const resp=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
  const data=await resp.json();
  const text=data.content?.find(b=>b.type==="text")?.text||"";
  let jsonText=text.trim().replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"");
  const s=jsonText.indexOf("{"),en=jsonText.lastIndexOf("}");
  if(s>=0&&en>s) jsonText=jsonText.substring(s,en+1);
  return JSON.parse(jsonText);
}

async function splitAndParsePDF(base64) {
  // Use PDF.js to check page count and extract each page as separate PDF
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  const pdfDoc = await pdfjsLib.getDocument({data:bytes}).promise;
  const numPages = pdfDoc.numPages;

  if(numPages === 1) {
    // Single page — parse normally
    return await parsePDFPage(base64, "single speed");
  }

  // Multi-page: render each page to image and send as image
  const pageResults = [];
  let baseInfo = null;

  for(let pageNum=1; pageNum<=numPages; pageNum++) {
    const page = await pdfDoc.getPage(pageNum);
    const viewport = page.getViewport({scale: 2.0});
    const canvas = document.createElement("canvas");
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext("2d");
    await page.render({canvasContext:ctx, viewport}).promise;
    const imageB64 = canvas.toDataURL("image/jpeg", 0.85).split(",")[1];

    // Send as image to Claude
    const prompt=`Extract isokinetic data from this Cybex HUMAC NORM report page. Return ONLY valid JSON, no markdown.
{"speed_deg_s":60,"reps":5,"athlete_name":"","test_date":"YYYY-MM-DD","joint":"knee","protocol":"con_con","gravity_corrected":true,"results":[{"side":"right","muscle_group":"extensors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"avg_power":0,"power_cov":0,"rom":0,"rom_cov":0,"joint_angle_peak":0,"time_to_peak":0,"force_decay":0},{"side":"left","muscle_group":"extensors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"avg_power":0,"power_cov":0,"rom":0,"rom_cov":0,"joint_angle_peak":0,"time_to_peak":0,"force_decay":0},{"side":"right","muscle_group":"flexors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"avg_power":0,"power_cov":0,"rom":0,"rom_cov":0,"joint_angle_peak":0,"time_to_peak":0,"force_decay":0},{"side":"left","muscle_group":"flexors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"avg_power":0,"power_cov":0,"rom":0,"rom_cov":0,"joint_angle_peak":0,"time_to_peak":0,"force_decay":0}]}`;

    const resp=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageB64}},{type:"text",text:prompt}]}]})});
    const apiData=await resp.json();
    const text=apiData.content?.find(b=>b.type==="text")?.text||"";
    let jsonText=text.trim().replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"");
    const s=jsonText.indexOf("{"),en=jsonText.lastIndexOf("}");
    if(s>=0&&en>s) jsonText=jsonText.substring(s,en+1);
    const pageData = JSON.parse(jsonText);

    if(!baseInfo && pageData.athlete_name) {
      baseInfo = {athlete_name:pageData.athlete_name, test_date:pageData.test_date, joint:pageData.joint||"knee", protocol:pageData.protocol||"con_con", gravity_corrected:pageData.gravity_corrected??true};
    }
    pageResults.push({speed_deg_s:pageData.speed_deg_s||60, reps:pageData.reps||5, results:pageData.results||[]});
  }

  return {...(baseInfo||{}), speeds: pageResults};
}

{"athlete_name":"","test_date":"YYYY-MM-DD","joint":"knee","protocol":"con_con","gravity_corrected":true,"speeds":[{"speed_deg_s":60,"reps":5,"results":[{"side":"right","muscle_group":"extensors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"avg_power":0,"power_cov":0,"joint_angle_peak":0,"rom":0,"rom_cov":0,"time_to_peak":0,"force_decay":0}]}]}
Include right+left extensors+flexors for EACH speed. Keep numbers as-is from the report.`;
  const resp=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
  const data=await resp.json();
  const text=data.content?.find(b=>b.type==="text")?.text||"";
  console.log("RAW RESPONSE:", text.substring(0,200));
  // More aggressive JSON extraction
  let jsonText = text.trim();
  // Remove markdown code blocks
  jsonText = jsonText.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
  // Find JSON boundaries
  const jsonStart = jsonText.indexOf('{');
  const jsonEnd = jsonText.lastIndexOf('}');
  if(jsonStart>=0 && jsonEnd>jsonStart) jsonText = jsonText.substring(jsonStart, jsonEnd+1);
  console.log("JSON length:", jsonText.length);
  const parsed=JSON.parse(jsonText);
  console.log("PARSED KEYS:", Object.keys(parsed), "HAS SPEEDS:", !!parsed.speeds);
  // Normalize all possible formats
  if(!parsed.speeds) {
    // Format 1: {results:[...], speed_deg_s:60}
    if(parsed.results) {
      parsed.speeds = [{speed_deg_s:parsed.speed_deg_s||60, reps:parsed.reps||5, results:parsed.results}];
    }
    // Format 2: {60: {results:[...]}, 180: {results:[...]}}
    else if(Object.keys(parsed).some(k=>!isNaN(k))) {
      parsed.speeds = Object.entries(parsed)
        .filter(([k])=>!isNaN(k))
        .map(([k,v])=>({speed_deg_s:+k, reps:v.reps||5, results:v.results||[]}));
    }
    // Format 3: flat array of results with speed field
    else if(Array.isArray(parsed)) {
      const bySpeed = {};
      parsed.forEach(r=>{ const s=r.speed_deg_s||60; if(!bySpeed[s]) bySpeed[s]=[]; bySpeed[s].push(r); });
      parsed = {speeds: Object.entries(bySpeed).map(([s,results])=>({speed_deg_s:+s,reps:5,results}))};
    }
    else {
      parsed.speeds = [];
    }
  }
  // Ensure each speed has a results array
  if(parsed.speeds) {
    parsed.speeds = parsed.speeds.map(s=>({...s, results: Array.isArray(s.results)?s.results:[]}));
  }
  return parsed;
}

function MultiSpeedInput({athlete, onSave, onCancel}) {
  const [speeds, setSpeeds] = useState([60, 180]);

  const [joint, setJoint] = useState("knee");
  const [protocol, setProtocol] = useState("con_con");
  const [testDate, setTestDate] = useState(new Date().toISOString().split("T")[0]);
  const [gravityCorr, setGravityCorr] = useState(true);
  const [notes, setNotes] = useState("");
  const [mode, setMode] = useState("upload");
  const [parsedSession, setParsedSession] = useState(null); // single PDF with all speeds
  const [uploads, setUploads] = useState({}); // fallback: per-speed
  const [parsing, setParsing] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  const addSpeed = () => {
    const s = parseInt(newSpeed);
    if(s && !speeds.includes(s)) { setSpeeds(p=>[...p,s].sort((a,b)=>a-b)); setNewSpeed(""); }
  };
  const removeSpeed = (s) => setSpeeds(p=>p.filter(x=>x!==s));

  const groups = joint==="shoulder" ? ["extensors","flexors","internal_rot","external_rot"] : ["extensors","flexors"];
  const emptyRows = () => ["right","left"].flatMap(s=>groups.map(g=>({side:s,muscle_group:g,peak_torque:"",pt_cov:"",pt_bw:"",work_per_rep:"",work_cov:"",avg_power:"",power_cov:"",joint_angle_peak:"",rom:"",rom_cov:"",time_to_peak:"",force_decay:""})));
  const [manualData, setManualData] = useState({});
  const getManualRows = (spd) => manualData[spd] || emptyRows();
  const setManualVal = (spd,i,k,v) => setManualData(p=>({...p,[spd]:getManualRows(spd).map((row,idx)=>idx===i?{...row,[k]:v}:row)}));
  const toN = v => v===""?null:+v;

  const handleSessionFile = async(e) => {
    const file = e.target.files[0]; if(!file) return;
    setParsing(true); setError("");
    try {
      const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      // Split PDF by page and parse each separately
      const data = await splitAndParsePDF(b64);
      if(data.speeds?.length>0) {
        setParsedSession(data);
        setSpeeds(data.speeds.map(s=>s.speed_deg_s).sort((a,b)=>a-b));
        setTestDate(data.test_date||testDate);
        setJoint(data.joint||data.joint||joint);
      } else {
        throw new Error("Δεν εντοπίστηκαν δεδομένα. Δοκίμασε χειροκίνητη εισαγωγή.");
      }
    } catch(err) { setError("Σφάλμα: "+err.message); }
    setParsing(false);
  };

  const handleFile = async(spd, e) => {
    const file = e.target.files[0]; if(!file) return;
    setParsing(true); setError("");
    try {
      const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const data = await splitAndParsePDF(b64);
      setUploads(p=>({...p,[spd]:data.speeds?.[0]||{results:[]}}));
    } catch(err) { setError("Σφάλμα PDF "+spd+"°/s: "+err.message); }
    setParsing(false);
  };

  const saveSession = async() => {
    setSaving(true); setError("");
    try {
      const sessionId = crypto.randomUUID();
      // Determine speed data source
      const speedData = (parsedSession?.speeds?.length>0)
        ? parsedSession.speeds
        : speeds.map(spd=>({speed_deg_s:spd, reps:uploads[spd]?.reps||5, results:uploads[spd]?.results||[]}));
      if(!speedData || speedData.length===0) throw new Error("Δεν βρέθηκαν δεδομένα ταχύτητας");

      for(const sd of speedData) {
        const spd = sd.speed_deg_s;
        const results = mode==="upload"
          ? (sd.results || [])
          : getManualRows(spd).map(row=>Object.fromEntries(Object.entries(row).map(([k,v])=>["side","muscle_group"].includes(k)?[k,v]:[k,toN(v)])));
        if(!results.length) continue;
        const meas = await db.post("measurements", {
          athlete_id:athlete.id, test_date:testDate, joint, protocol,
          speed_deg_s:spd, reps:sd.reps||5,
          gravity_corrected:gravityCorr, source:mode==="upload"?"pdf_upload":"manual",
          notes:notes+(speedData.length>1?" [Multi-Speed "+speedData.map(s=>s.speed_deg_s).join("+")+"°/s]":""),
          session_id:sessionId, raw_json:null,
        });
        if(!meas?.id) throw new Error("Σφάλμα αποθήκευσης "+spd+"°/s");
        for(const row of results) {
          const clean = {measurement_id:meas.id, speed_deg_s:spd};
          Object.entries(row).forEach(([k,v])=>{ if(KNOWN_COLS.has(k)&&v!=null) clean[k]=v; });
          await db.post("test_results", clean);
        }
      }
      onSave();
    } catch(err) { setError(err.message); }
    setSaving(false);
  };

  const allUploaded = parsedSession || speeds.every(s=>uploads[s]);
  const canSave = mode==="upload" ? !!allUploaded : true;

  return html`
    <div>
      <div style=${{marginBottom:20}}>
        <div style=${{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Νέο Multi-Speed Session</div>
        <div style=${{fontSize:22,fontWeight:700}}>${athlete.name}</div>
      </div>
      <${Card} style=${{marginBottom:16}}>
        <${Sec} t="Ρύθμιση Session"/>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
          <div><${Lbl} t="Ημερομηνία"/><input type="date" value=${testDate} onInput=${e=>setTestDate(e.target.value)}/></div>
          <div><${Lbl} t="Άρθρωση"/><select value=${joint} onChange=${e=>setJoint(e.target.value)}>${["knee","shoulder","trunk","elbow","ankle"].map(j=>html`<option value=${j}>${j}</option>`)}</select></div>
          <div><${Lbl} t="Πρωτόκολλο"/><select value=${protocol} onChange=${e=>setProtocol(e.target.value)}>${["con_con","con_ecc","ecc_con","isometric","isotonic"].map(p=>html`<option value=${p}>${p}</option>`)}</select></div>
          <div style=${{display:"flex",alignItems:"center",gap:8,paddingTop:20}}>
            <input type="checkbox" checked=${gravityCorr} onChange=${e=>setGravityCorr(e.target.checked)} style=${{width:"auto"}}/>
            <span style=${{fontSize:12,color:C.muted}}>Gravity Correction</span>
          </div>
          <div style=${{gridColumn:"2/-1"}}><${Lbl} t="Σημειώσεις"/><input value=${notes} onInput=${e=>setNotes(e.target.value)} placeholder="π.χ. Post ACL-R"/></div>
        </div>
        <${Sec} t="Ταχύτητες (°/s)"/>
        <div style=${{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
          ${speeds.map(s=>html`
            <div key=${s} style=${{display:"flex",alignItems:"center",gap:6,background:C.bg3,border:`1px solid ${C.accent}`,borderRadius:20,padding:"4px 12px"}}>
              <span style=${{fontFamily:"monospace",fontWeight:600,color:C.accent}}>${s}°/s</span>
              <button onClick=${()=>removeSpeed(s)} style=${{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>
            </div>
          `)}
          <div style=${{display:"flex",gap:6}}>
            <input type="number" value=${newSpeed} onInput=${e=>setNewSpeed(e.target.value)} placeholder="π.χ. 300" style=${{width:90}} onKeyDown=${e=>e.key==="Enter"&&addSpeed()}/>
            <button onClick=${addSpeed} style=${{padding:"6px 12px",background:C.bg3,color:C.accent,border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer"}}>+ Προσθήκη</button>
          </div>
        </div>
        <div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>
          ${[[60],[180],[300],[60,180],[60,180,300]].map(preset=>html`
            <button key=${preset.join("+")} onClick=${()=>setSpeeds([...preset])} style=${{padding:"4px 10px",background:C.bg3,color:C.muted,border:`1px solid ${C.border}`,borderRadius:4,cursor:"pointer",fontSize:11}}>${preset.join("+")}°/s</button>
          `)}
        </div>
      <//>

      <div style=${{display:"flex",gap:8,marginBottom:20,marginTop:16}}>
        ${["upload","manual"].map(m=>html`<button key=${m} onClick=${()=>setMode(m)} style=${{padding:"8px 18px",background:mode===m?C.accent:C.bg3,color:mode===m?"white":C.muted,border:`1px solid ${mode===m?C.accent:C.border}`,borderRadius:6,cursor:"pointer"}}>${m==="upload"?"📄 Upload PDFs":"✏️ Χειροκίνητη"}</button>`)}
      </div>

      ${mode==="upload"&&html`
        <${Card} style=${{marginBottom:16,border:`1px solid ${parsedSession?C.green:C.border}`}}>
          <${Sec} t="Upload PDF (1 αρχείο — όλες οι ταχύτητες)"/>
          ${!parsedSession?html`
            <label style=${{display:"block",border:`2px dashed ${C.border}`,borderRadius:8,padding:32,textAlign:"center",cursor:"pointer",color:C.muted}}>
              ${parsing?html`<${Sp}/><div style=${{marginTop:8}}>Ανάλυση με AI — εξαγωγή όλων των ταχυτήτων...</div>`:html`
                <div style=${{fontSize:36}}>📄</div>
                <div style=${{marginTop:8,fontWeight:600}}>Κλικ για επιλογή PDF</div>
                <div style=${{fontSize:11,marginTop:4,color:C.muted}}>Cybex HUMAC NORM — 1 αρχείο με όλες τις ταχύτητες</div>
              `}
              <input type="file" accept=".pdf" onChange=${handleSessionFile} style=${{display:"none"}}/>
            </label>
          `:html`
            <div style=${{color:C.green,fontWeight:600,marginBottom:12}}>✅ PDF αναλύθηκε — ${parsedSession.speeds?.length} ταχύτητες εντοπίστηκαν</div>
            ${parsedSession.speeds?.map((sd,si)=>html`
              <div key=${si} style=${{marginBottom:12,background:C.bg3,borderRadius:8,padding:"10px 14px"}}>
                <div style=${{fontSize:13,fontWeight:700,color:C.accent,fontFamily:"monospace",marginBottom:8}}>${sd.speed_deg_s}°/s — ${sd.results?.length} αποτελέσματα</div>
                ${sd.results?.slice(0,4).map((r,i)=>html`
                  <div key=${i} style=${{display:"flex",gap:12,padding:"3px 0",fontSize:12,borderBottom:`1px solid ${C.border}`}}>
                    <span style=${{textTransform:"capitalize",width:90,color:C.muted}}>${r.muscle_group}</span>
                    <span class="muted">${r.side==="right"?"Δεξί":"Αριστ."}</span>
                    <span class=${"mono "+(r.pt_cov>0.25?"red":r.pt_cov>0.15?"yellow":"green")}>${r.peak_torque} Nm</span>
                    <span class="muted mono">CoV: ${r.pt_cov}</span>
                  </div>
                `)}
              </div>
            `)}
            <button onClick=${()=>setParsedSession(null)} style=${{background:"none",color:C.red,border:"none",cursor:"pointer",fontSize:11}}>✕ Νέο PDF</button>
          `}
        <//>
      `}

      ${mode==="manual"&&speeds.map(spd=>html`
        <${Card} key=${spd} style=${{marginBottom:16,border:`1px solid ${C.border}`}}>
          <div style=${{fontSize:14,fontWeight:700,color:C.accent,fontFamily:"monospace",marginBottom:12}}>${spd}°/s</div>
          ${getManualRows(spd).map((row,i)=>html`
            <div key=${i} style=${{marginBottom:10}}>
              <div style=${{fontSize:11,fontWeight:600,color:C.accent,marginBottom:6,textTransform:"uppercase"}}>${row.side==="right"?"🔴":"🔵"} ${row.muscle_group}</div>
              <div style=${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                ${[["peak_torque","PT (Nm)"],["pt_cov","CoV"],["pt_bw","%BW"],["work_per_rep","Work"],["avg_power","Power"],["rom","ROM"],["joint_angle_peak","Angle"],["time_to_peak","T.Peak"]].map(([k,l])=>html`
                  <div key=${k}>
                    <div style=${{fontSize:9,color:C.muted,marginBottom:2}}>${l}</div>
                    <input type="number" step="0.01" value=${row[k]} onInput=${e=>setManualVal(spd,i,k,e.target.value)} placeholder="—" style=${{fontSize:11,padding:"5px 6px"}}/>
                  </div>
                `)}
              </div>
            </div>
          `)}
        <//>
      `)}

      ${error&&html`<div style=${{color:C.red,marginBottom:8,fontSize:12}}>${error}</div>`}

      <div style=${{display:"flex",gap:10}}>
        <${Btn} onClick=${saveSession} disabled=${saving||!canSave} color=${C.green} textColor="#0d0f14">
          ${saving?html`<${Sp}/>`:""}  Αποθήκευση Session (${speeds.join("+")}°/s)
        <//>
        <${Btn} onClick=${onCancel} color=${C.bg3} textColor=${C.muted}>Ακύρωση<//>
      </div>
    </div>`;
}

// ── MULTI-SPEED ANALYSIS ──────────────────────────────────────────────────────
function MultiSpeedAnalysis({measurements, athlete}) {
  const sessions = {};
  measurements.forEach(m => {
    const key = m.session_id || (m.test_date+"_"+m.joint+"_"+m.protocol);
    if(!sessions[key]) sessions[key] = {date:m.test_date,joint:m.joint,measurements:[]};
    sessions[key].measurements.push(m);
  });
  const multi = Object.values(sessions).filter(s=>s.measurements.length>1).sort((a,b)=>new Date(b.date)-new Date(a.date));

  if(!multi.length) return html`
    <${Card} style=${{textAlign:"center",padding:40,color:C.muted}}>
      <div style=${{fontSize:32,marginBottom:12}}>⚡</div>
      <div>Δεν υπάρχουν multi-speed sessions.</div>
      <div style=${{fontSize:12,marginTop:8,color:C.muted}}>Χρησιμοποίησε το κουμπί "⚡ Multi-Speed" για να προσθέσεις.</div>
    <//>`;

  const [sel, setSel] = useState(0);
  const session = multi[sel];
  const speeds = [...session.measurements].sort((a,b)=>a.speed_deg_s-b.speed_deg_s);
  const gv = (m,s,g,k) => m.test_results?.find(r=>r.side===s&&r.muscle_group===g)?.[k];

  const rows = [
    ["Peak Torque Εκτ. Δεξί (Nm)", m=>gv(m,"right","extensors","peak_torque"), ""],
    ["Peak Torque Εκτ. Αριστ. (Nm)", m=>gv(m,"left","extensors","peak_torque"), ""],
    ["Peak Torque Κάμπτ. Δεξί (Nm)", m=>gv(m,"right","flexors","peak_torque"), ""],
    ["Peak Torque Κάμπτ. Αριστ. (Nm)", m=>gv(m,"left","flexors","peak_torque"), ""],
    ["%BW Εκτ. Δεξί", m=>gv(m,"right","extensors","pt_bw"), "%"],
    ["Work Εκτ. Δεξί (Nm)", m=>gv(m,"right","extensors","work_per_rep"), ""],
    ["Power Εκτ. Δεξί (W)", m=>gv(m,"right","extensors","avg_power"), ""],
    ["H/Q Δεξί (%)", m=>{const f=gv(m,"right","flexors","peak_torque"),e=gv(m,"right","extensors","peak_torque");return calcHQ(f,e);}, "%"],
    ["H/Q Αριστ. (%)", m=>{const f=gv(m,"left","flexors","peak_torque"),e=gv(m,"left","extensors","peak_torque");return calcHQ(f,e);}, "%"],
    ["LSI PT Εκτ. (%)", m=>calcLSI(gv(m,"right","extensors","peak_torque"),gv(m,"left","extensors","peak_torque")), "%"],
  ];

  return html`
    <div>
      ${multi.length>1&&html`
        <div style=${{marginBottom:16}}>
          <${Lbl} t="Επιλογή Session"/>
          <select value=${sel} onChange=${e=>setSel(+e.target.value)}>
            ${multi.map((s,i)=>html`<option key=${i} value=${i}>${s.date} — ${s.joint} [${s.measurements.map(m=>m.speed_deg_s).sort((a,b)=>a-b).join("+")}°/s]</option>`)}
          </select>
        </div>
      `}

      <${Sec} t=${"Session: "+session.date+" — "+speeds.map(m=>m.speed_deg_s).join("+")}/>

      <${Card} style=${{padding:0,marginBottom:20}}>
        <table>
          <thead>
            <tr>
              <th>Παράμετρος</th>
              ${speeds.map(m=>html`<th key=${m.speed_deg_s} style=${{textAlign:"center",color:C.accent}}>${m.speed_deg_s}°/s</th>`)}
              ${speeds.length>1&&html`<th style=${{textAlign:"center"}}>Δ ${speeds[0].speed_deg_s}→${speeds[speeds.length-1].speed_deg_s}</th>`}
            </tr>
          </thead>
          <tbody>
            ${rows.map(([lbl,fn,unit])=>{
              const vals = speeds.map(m=>fn(m));
              const first = vals[0], last = vals[vals.length-1];
              const delta = (first!=null&&last!=null&&first!==0) ? Math.round(((last-first)/Math.abs(first))*100) : null;
              const isHQ = lbl.includes("H/Q");
              const isLSI = lbl.includes("LSI");
              return html`
                <tr key=${lbl}>
                  <td class="muted" style=${{fontSize:12}}>${lbl}</td>
                  ${vals.map((v,i)=>html`
                    <td key=${i} class=${"mono "+(isHQ?hq_c(v):isLSI?lsi_c(v):"")} style=${{textAlign:"center",fontWeight:600}}>
                      ${v!=null?v+unit:"—"}
                    </td>
                  `)}
                  ${speeds.length>1&&html`
                    <td style=${{textAlign:"center"}}>
                      ${delta!=null&&html`<${Bdg} txt=${(delta>0?"+":"")+delta+"%"} color=${delta>=0?"green":"red"}/>`}
                    </td>
                  `}
                </tr>`;
            })}
          </tbody>
        </table>
      <//>

      <${Sec} t="LSI & H/Q ανά Ταχύτητα"/>
      <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:16}}>
        ${speeds.map(m=>{
          const an=analyze(m.test_results||[],athlete?.gender||"");
          return html`
            <${Card} key=${m.speed_deg_s}>
              <div style=${{fontSize:16,fontWeight:700,color:C.accent,fontFamily:"monospace",marginBottom:12,textAlign:"center"}}>${m.speed_deg_s}°/s</div>
              <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                ${[["LSI Εκτ.",an.lsi_ext,lsi_c(an.lsi_ext),"≥90%"],["H/Q Δεξί",an.hq_r,hq_c(an.hq_r),"55-65%"],["H/Q Αριστ.",an.hq_l,hq_c(an.hq_l),"55-65%"],["LSI Κάμπτ.",an.lsi_flex,lsi_c(an.lsi_flex),"≥90%"]].map(([lbl,val,cls,norm])=>html`
                  <div key=${lbl} style=${{textAlign:"center",background:C.bg3,borderRadius:6,padding:"8px 4px"}}>
                    <div style=${{fontSize:9,color:C.muted,marginBottom:3}}>${lbl}</div>
                    <div class=${"mono "+cls} style=${{fontSize:18,fontWeight:700}}>${val!=null?val+"%":"—"}</div>
                    <div style=${{fontSize:8,color:C.muted}}>${norm}</div>
                  </div>
                `)}
              </div>
            <//>`;
        })}
      </div>
    </div>`;
}


// ── MEASUREMENT INPUT ─────────────────────────────────────────────────────────
function MeasurementInput({athlete,onSave,onCancel}){
  const [mode,setMode]=useState("upload");
  const [parsing,setParsing]=useState(false);
  const [parsed,setParsed]=useState(null);
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState("");
  const [meta,setMeta]=useState({test_date:new Date().toISOString().split("T")[0],joint:"knee",protocol:"con_con",speed_deg_s:60,reps:5,gravity_corrected:true,notes:""});
  const sm=(k,v)=>setMeta(p=>({...p,[k]:v}));
  const groups=meta.joint==="shoulder"?["extensors","flexors","internal_rot","external_rot"]:["extensors","flexors"];
  const emptyRow=(s,g)=>({side:s,muscle_group:g,peak_torque:"",pt_cov:"",pt_bw:"",work_per_rep:"",work_cov:"",work_bw:"",avg_power:"",power_cov:"",power_bw:"",joint_angle_peak:"",rom:"",rom_cov:"",time_to_peak:"",force_decay:""});
  const [rows,setRows]=useState(()=>["right","left"].flatMap(s=>groups.map(g=>emptyRow(s,g))));
  const setVal=(i,k,v)=>setRows(r=>r.map((row,idx)=>idx===i?{...row,[k]:v}:row));
  const toN=v=>v===""?null:+v;

  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setParsing(true);setError("");
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const data=await splitAndParsePDF(b64);
      // For single measurement, use first speed
      const firstSpeed = data.speeds?.[0]||{};
      const normalized = {...data, results:firstSpeed.results||[], speed_deg_s:firstSpeed.speed_deg_s||60, reps:firstSpeed.reps||5};
      setParsed(normalized);
      setMeta(m=>({...m,test_date:data.test_date||m.test_date,joint:data.joint||m.joint,protocol:data.protocol||m.protocol,speed_deg_s:firstSpeed.speed_deg_s||m.speed_deg_s,reps:firstSpeed.reps||m.reps}));
    }catch(err){setError("Σφάλμα: "+err.message);}
    setParsing(false);
  };

  const saveMeas=async(results)=>{
    setSaving(true);setError("");
    try{
      const meas=await db.post("measurements",{athlete_id:athlete.id,...meta,speed_deg_s:+meta.speed_deg_s,reps:+meta.reps,raw_json:parsed||null,source:mode==="upload"?"pdf_upload":"manual"});
      if(!meas?.id)throw new Error("Δεν επιστράφηκε ID");
      for(const row of results){
        const clean={measurement_id:meas.id};
        Object.entries(row).forEach(([k,v])=>{if(KNOWN_COLS.has(k)&&v!=null)clean[k]=v;});
        await db.post("test_results",clean);
      }
      onSave(meas);
    }catch(err){setError(err.message);}
    setSaving(false);
  };

  const submitManual=()=>saveMeas(rows.map(row=>Object.fromEntries(Object.entries(row).map(([k,v])=>["side","muscle_group"].includes(k)?[k,v]:[k,toN(v)]))));

  return html`
    <div>
      <div style=${{marginBottom:20}}><div style=${{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Νέα Μέτρηση</div><div style=${{fontSize:22,fontWeight:700}}>${athlete.name}</div></div>
      <div style=${{display:"flex",gap:8,marginBottom:20}}>
        ${["upload","manual"].map(m=>html`<button key=${m} onClick=${()=>setMode(m)} style=${{padding:"8px 18px",background:mode===m?C.accent:C.bg3,color:mode===m?"white":C.muted,border:`1px solid ${mode===m?C.accent:C.border}`,borderRadius:6,cursor:"pointer"}}>${m==="upload"?"📄 Upload PDF":"✏️ Χειροκίνητη"}</button>`)}
      </div>
      <${Card} style=${{marginBottom:16}}>
        <${Sec} t="Στοιχεία Μέτρησης"/>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
          <div><${Lbl} t="Ημερομηνία"/><input type="date" value=${meta.test_date} onInput=${e=>sm("test_date",e.target.value)}/></div>
          <div><${Lbl} t="Άρθρωση"/><select value=${meta.joint} onChange=${e=>sm("joint",e.target.value)}>${["knee","shoulder","trunk","elbow","ankle"].map(j=>html`<option value=${j}>${j}</option>`)}</select></div>
          <div><${Lbl} t="Πρωτόκολλο"/><select value=${meta.protocol} onChange=${e=>sm("protocol",e.target.value)}>${["con_con","con_ecc","ecc_con","isometric","isotonic"].map(p=>html`<option value=${p}>${p}</option>`)}</select></div>
          <div><${Lbl} t="Ταχύτητα (°/s)"/><input type="number" value=${meta.speed_deg_s} onInput=${e=>sm("speed_deg_s",e.target.value)}/></div>
          <div><${Lbl} t="Reps"/><input type="number" value=${meta.reps} onInput=${e=>sm("reps",e.target.value)}/></div>
          <div style=${{display:"flex",alignItems:"center",gap:8,paddingTop:20}}><input type="checkbox" checked=${meta.gravity_corrected} onChange=${e=>sm("gravity_corrected",e.target.checked)} style=${{width:"auto"}}/><span style=${{fontSize:12,color:C.muted}}>Gravity Correction</span></div>
          <div style=${{gridColumn:"1/-1"}}><${Lbl} t="Σημειώσεις"/><input value=${meta.notes} onInput=${e=>sm("notes",e.target.value)} placeholder="π.χ. Post ACL-R 6 μήνες"/></div>
        </div>
      <//>
      ${mode==="upload"?html`
        <${Card}>
          <${Sec} t="Upload PDF Cybex HUMAC"/>
          ${!parsed?html`
            <div>
              <label style=${{display:"block",border:`2px dashed ${C.border}`,borderRadius:8,padding:32,textAlign:"center",cursor:"pointer",color:C.muted}}>
                ${parsing?html`<${Sp}/><div style=${{marginTop:8}}>Ανάλυση με AI...</div>`:html`<div style=${{fontSize:36}}>📄</div><div style=${{marginTop:8}}>Κλικ για επιλογή PDF</div><div style=${{fontSize:11,marginTop:4}}>Cybex HUMAC NORM</div>`}
                <input type="file" accept=".pdf" onChange=${handleFile} style=${{display:"none"}}/>
              </label>
              ${error&&html`<div style=${{color:C.red,marginTop:8,fontSize:12}}>${error}</div>`}
            </div>
          `:html`
            <div>
              <div style=${{color:C.green,marginBottom:16,fontWeight:600}}>✅ PDF αναλύθηκε — ${parsed.results?.length} αποτελέσματα</div>
              <${Card} style=${{background:C.bg3,padding:0,marginBottom:16}}>
                <table><thead><tr><th>Ομάδα</th><th>Πλευρά</th><th>Peak Torque</th><th>CoV</th><th>%BW</th><th>Work</th><th>Power</th></tr></thead>
                <tbody>${parsed.results?.map((r,i)=>html`<tr key=${i}><td style=${{textTransform:"capitalize"}}>${r.muscle_group}</td><td class="muted">${r.side==="right"?"Δεξί":"Αριστ."}</td><td class=${"mono "+(r.pt_cov>0.25?"red":r.pt_cov>0.15?"yellow":"green")}>${r.peak_torque} Nm</td><td><${Bdg} txt=${r.pt_cov} color=${cov_c(r.pt_cov)}/></td><td class="mono muted">${r.pt_bw}%</td><td class="mono">${r.work_per_rep}</td><td class="mono">${r.avg_power}</td></tr>`)}</tbody></table>
              <//>
              ${error&&html`<div style=${{color:C.red,marginBottom:8,fontSize:12}}>${error}</div>`}
              <div style=${{display:"flex",gap:10}}>
                <${Btn} onClick=${()=>saveMeas(parsed.results)} disabled=${saving} color=${C.green} textColor="#0d0f14">${saving?html`<${Sp}/>`:""} Αποθήκευση<//>
                <${Btn} onClick=${()=>setParsed(null)} color=${C.bg3} textColor=${C.muted}>Νέο PDF<//>
                <${Btn} onClick=${onCancel} color=${C.bg3} textColor=${C.muted}>Ακύρωση<//>
              </div>
            </div>
          `}
        <//>
      `:html`
        <div>
          ${rows.map((row,i)=>html`
            <${Card} key=${i} style=${{marginBottom:12}}>
              <div style=${{fontSize:12,fontWeight:600,color:C.accent,marginBottom:12,textTransform:"uppercase"}}>${row.side==="right"?"🔴 Δεξί":"🔵 Αριστερό"} — ${row.muscle_group}</div>
              <div style=${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                ${[["peak_torque","Peak Torque (Nm)"],["pt_cov","CoV PT"],["pt_bw","%BW"],["work_per_rep","Work (Nm)"],["work_cov","CoV Work"],["avg_power","Power (W)"],["power_cov","CoV Power"],["joint_angle_peak","Angle (°)"],["rom","ROM (°)"],["rom_cov","CoV ROM"],["time_to_peak","Time Peak (s)"],["force_decay","Force Decay (s)"]].map(([k,l])=>html`<div key=${k}><${Lbl} t=${l}/><input type="number" step="0.01" value=${row[k]} onInput=${e=>setVal(i,k,e.target.value)} placeholder="—"/></div>`)}
              </div>
            <//>
          `)}
          ${error&&html`<div style=${{color:C.red,marginBottom:8,fontSize:12}}>${error}</div>`}
          <div style=${{display:"flex",gap:10}}>
            <${Btn} onClick=${submitManual} disabled=${saving} color=${C.green} textColor="#0d0f14">${saving?html`<${Sp}/>`:""} Αποθήκευση<//>
            <${Btn} onClick=${onCancel} color=${C.bg3} textColor=${C.muted}>Ακύρωση<//>
          </div>
        </div>
      `}
    </div>`;
}

// ── ATHLETE FORM ──────────────────────────────────────────────────────────────
function AthleteForm({athlete,onSave,onCancel}){
  const [f,setF]=useState(athlete||{name:"",dob:"",gender:"",weight_kg:"",height_cm:"",sport:"",notes:""});
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!f.name)return;setSaving(true);
    try{const p={...f,weight_kg:+f.weight_kg||null,height_cm:+f.height_cm||null};const result=athlete?.id?await db.patch("athletes",athlete.id,p):await db.post("athletes",p);onSave(result||p);}
    catch(e){alert(e.message);}setSaving(false);
  };
  return html`
    <div>
      <div style=${{marginBottom:20}}><div style=${{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>${athlete?"Επεξεργασία":"Νέος Αθλητής"}</div><div style=${{fontSize:22,fontWeight:700}}>${f.name||"Αθλητής"}</div></div>
      <${Card}>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style=${{gridColumn:"1/-1"}}><${Lbl} t="Ονοματεπώνυμο *"/><input value=${f.name} onInput=${e=>set("name",e.target.value)} placeholder="π.χ. Παπαδόπουλος Γιώργος"/></div>
          <div><${Lbl} t="Ημ. Γέννησης"/><input type="date" value=${f.dob} onInput=${e=>set("dob",e.target.value)}/></div>
          <div><${Lbl} t="Φύλο"/><select value=${f.gender} onChange=${e=>set("gender",e.target.value)}><option value="">—</option><option value="male">Άνδρας</option><option value="female">Γυναίκα</option></select></div>
          <div><${Lbl} t="Βάρος (kg)"/><input type="number" value=${f.weight_kg} onInput=${e=>set("weight_kg",e.target.value)}/></div>
          <div><${Lbl} t="Ύψος (cm)"/><input type="number" value=${f.height_cm} onInput=${e=>set("height_cm",e.target.value)}/></div>
          <div style=${{gridColumn:"1/-1"}}><${Lbl} t="Άθλημα"/><input value=${f.sport} onInput=${e=>set("sport",e.target.value)} placeholder="π.χ. Ποδόσφαιρο"/></div>
          <div style=${{gridColumn:"1/-1"}}><${Lbl} t="Σημειώσεις"/><textarea value=${f.notes} onInput=${e=>set("notes",e.target.value)} rows=2 placeholder="Ιστορικό τραυματισμών..."/></div>
        </div>
        <div style=${{display:"flex",gap:10,marginTop:16}}>
          <${Btn} onClick=${save} disabled=${saving}>${saving?html`<${Sp}/>`:""} Αποθήκευση<//>
          <${Btn} onClick=${onCancel} color=${C.bg3} textColor=${C.muted}>Ακύρωση<//>
        </div>
      <//>
    </div>`;
}

// ── ATHLETE LIST ──────────────────────────────────────────────────────────────
function AthleteList({onSelect,onNew}){
  const [athletes,setAthletes]=useState([]);
  const [search,setSearch]=useState("");
  const [loading,setLoading]=useState(true);
  useEffect(()=>{db.get("athletes",`&order=name.asc`).then(d=>{setAthletes(d||[]);setLoading(false);}).catch(()=>setLoading(false));},[]);
  const f=athletes.filter(a=>a.name?.toLowerCase().includes(search.toLowerCase())||a.sport?.toLowerCase().includes(search.toLowerCase()));
  return html`
    <div>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div><div style=${{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Βάση Δεδομένων</div><div style=${{fontSize:22,fontWeight:700}}>Αθλητές</div></div>
        <${Btn} onClick=${onNew}>+ Νέος Αθλητής<//>
      </div>
      <input placeholder="Αναζήτηση ονόματος ή αθλήματος..." value=${search} onInput=${e=>setSearch(e.target.value)} style=${{marginBottom:16}}/>
      ${loading?html`<div style=${{textAlign:"center",padding:40}}><${Sp}/></div>`:f.length===0?html`<${Card} style=${{textAlign:"center",padding:40,color:C.muted}}><div style=${{fontSize:32,marginBottom:12}}>👤</div><div>Δεν βρέθηκαν αθλητές.</div><//>`:html`
        <${Card} style=${{padding:0}}>
          <table><thead><tr><th>Όνομα</th><th>Ηλικία</th><th>Φύλο</th><th>Άθλημα</th><th>Βάρος</th><th></th></tr></thead>
          <tbody>${f.map(a=>html`
            <tr key=${a.id} style=${{cursor:"pointer"}} onClick=${()=>onSelect(a)}>
              <td style=${{fontWeight:600}}>${a.name}</td>
              <td class="muted">${a.dob?age(a.dob)+" ετών":"—"}</td>
              <td class="muted">${a.gender==="male"?"Άνδρας":a.gender==="female"?"Γυναίκα":"—"}</td>
              <td class="muted">${a.sport||"—"}</td>
              <td class="muted">${a.weight_kg?a.weight_kg+" kg":"—"}</td>
              <td style=${{color:C.accent,fontSize:18}}>›</td>
            </tr>
          `)}</tbody></table>
        <//>
      `}
    </div>`;
}

// ── ATHLETE PROFILE ───────────────────────────────────────────────────────────
function AthleteProfile({athlete,onBack,onNewMeasurement,onNewMultiSpeed,onEdit,showToast}){
  const [measurements,setMeasurements]=useState([]);
  const [selected,setSelected]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("history");
  const [deleting,setDeleting]=useState(null);

  const load=useCallback(async()=>{
    setLoading(true);
    try{const data=await db.get("measurements",`,test_results(*)&athlete_id=eq.${athlete.id}&order=test_date.desc`);setMeasurements(data||[]);}
    catch(e){console.error(e);}
    setLoading(false);
  },[athlete.id]);

  useEffect(()=>{load();},[load]);
  const toggle=(id)=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id].slice(-2));

  const deleteMeas=async(m)=>{
    if(!confirm(`Διαγραφή μέτρησης ${m.test_date};`))return;
    setDeleting(m.id);
    try{await db.del("measurements",m.id);setMeasurements(ms=>ms.filter(x=>x.id!==m.id));setSelected(s=>s.filter(x=>x!==m.id));showToast("Μέτρηση διαγράφηκε");}
    catch(e){showToast(e.message,"error");}
    setDeleting(null);
  };

  const a=age(athlete.dob);
  const tabs=[["history","Ιστορικό"],["analysis","Ανάλυση"],["trends","📈 Εξέλιξη"],["compare","Σύγκριση"],["multispeed","⚡ Multi-Speed"]];

  return html`
    <div>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <button onClick=${onBack} style=${{background:"none",color:C.muted,fontSize:12,padding:"4px 0",marginBottom:8,border:"none",cursor:"pointer"}}>← Πίσω</button>
          <div style=${{fontSize:22,fontWeight:700}}>${athlete.name}</div>
          <div style=${{color:C.muted,fontSize:13,marginTop:2}}>${[a&&a+" ετών",athlete.gender==="male"?"Άνδρας":athlete.gender==="female"?"Γυναίκα":null,athlete.weight_kg&&athlete.weight_kg+"kg",athlete.height_cm&&athlete.height_cm+"cm",athlete.sport].filter(Boolean).join(" · ")}</div>
          ${athlete.notes&&html`<div style=${{fontSize:12,color:C.muted,marginTop:4,fontStyle:"italic"}}>${athlete.notes}</div>`}
        </div>
        <div style=${{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <${Btn} onClick=${()=>exportExcel(athlete,measurements)} color=${C.bg3} textColor=${C.muted} style=${{fontSize:12}}>📊 Export Excel<//>
          <${Btn} onClick=${onEdit} color=${C.bg3} textColor=${C.muted} style=${{fontSize:12}}>✏️ Επεξεργασία<//>
          <${Btn} onClick=${onNewMeasurement}>+ Νέα Μέτρηση<//>
          <${Btn} onClick=${onNewMultiSpeed} color=${"#1a5c3a"} style=${{fontSize:12}}>⚡ Multi-Speed<//>
        </div>
      </div>

      <div style=${{display:"flex",gap:4,marginBottom:20,borderBottom:`1px solid ${C.border}`}}>
        ${tabs.map(([v,l])=>html`<button key=${v} onClick=${()=>setTab(v)} style=${{padding:"8px 18px",background:"none",color:tab===v?C.accent:C.muted,borderBottom:tab===v?`2px solid ${C.accent}`:"2px solid transparent",border:"none",borderRadius:0,cursor:"pointer",fontWeight:tab===v?600:400}}>${l}</button>`)}
      </div>

      ${loading?html`<div style=${{textAlign:"center",padding:40}}><${Sp}/></div>`:html`
        ${tab==="history"&&html`
          <div>
            ${selected.length>0&&html`<div style=${{background:"rgba(79,142,247,0.08)",border:`1px solid ${C.accent}`,borderRadius:8,padding:"10px 16px",marginBottom:16,fontSize:12,color:C.accent}}>${selected.length===1?"1 μέτρηση επιλεγμένη — πάτα Ανάλυση":"2 μετρήσεις — πάτα Σύγκριση"}</div>`}
            ${measurements.length===0?html`<${Card} style=${{textAlign:"center",padding:40,color:C.muted}}><div style=${{fontSize:32,marginBottom:12}}>📊</div><div>Δεν υπάρχουν μετρήσεις.</div><//>`:html`
              <${Card} style=${{padding:0}}>
                <div style=${{overflowX:"auto"}}>
                  <table><thead><tr><th></th><th>Ημερομηνία</th><th>Άρθρωση</th><th>Πρωτόκολλο</th><th>°/s</th><th>Gravity</th><th>Πηγή</th><th>Σημειώσεις</th><th></th></tr></thead>
                  <tbody>${measurements.map(m=>html`
                    <tr key=${m.id}>
                      <td><input type="checkbox" checked=${selected.includes(m.id)} onChange=${()=>toggle(m.id)} style=${{width:"auto"}}/></td>
                      <td style=${{fontWeight:600}}>${m.test_date}</td>
                      <td style=${{textTransform:"capitalize"}}>${m.joint}</td>
                      <td><${Bdg} txt=${m.protocol} color="muted"/></td>
                      <td class="mono muted">${m.speed_deg_s}</td>
                      <td>${m.gravity_corrected?html`<span class="green">✓</span>`:html`<span class="red">✗</span>`}</td>
                      <td class="muted" style=${{fontSize:11}}>${m.source==="pdf_upload"?"PDF":"Manual"}</td>
                      <td class="muted" style=${{fontSize:11}}>${m.notes||"—"}</td>
                      <td style=${{whiteSpace:"nowrap"}}>
                        <button onClick=${()=>{setSelected([m.id]);setTab("analysis");}} style=${{background:C.bg3,color:C.accent,padding:"4px 10px",fontSize:11,border:"none",borderRadius:4,cursor:"pointer",marginRight:4}}>Ανάλυση</button>
                        <button onClick=${()=>deleteMeas(m)} disabled=${deleting===m.id} style=${{background:"rgba(242,95,92,0.1)",color:C.red,padding:"4px 10px",fontSize:11,border:"none",borderRadius:4,cursor:"pointer"}}>${deleting===m.id?html`<${Sp}/>`:""} 🗑</button>
                      </td>
                    </tr>
                  `)}</tbody></table>
                </div>
              <//>
            `}
          </div>
        `}
        ${tab==="analysis"&&html`<${AnalysisView} measurements=${measurements} selected=${selected} athlete=${athlete}/>`}
        ${tab==="trends"&&html`<${TrendCharts} measurements=${measurements}/>`}
        ${tab==="compare"&&html`<${CompareView} measurements=${measurements}/>`}
        ${tab==="multispeed"&&html`<${MultiSpeedAnalysis} measurements=${measurements} athlete=${athlete}/>`}
      `}
    </div>`;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("list");
  const [athlete,setAthlete]=useState(null);
  const [toast,setToast]=useState(null);
  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  return html`
    <div style=${{minHeight:"100vh",background:C.bg}}>
      <div style=${{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:"14px 32px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style=${{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick=${()=>setView("list")}>
          <div style=${{width:36,height:36,background:C.accent,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚡</div>
          <div><div style=${{fontWeight:700,fontSize:15}}>360 Ergometric Tests</div><div style=${{fontSize:11,color:C.muted}}>Isokinetic Assessment Platform</div></div>
        </div>
        ${athlete&&view!=="list"&&view!=="new"&&html`<div style=${{fontSize:12,color:C.muted}}><span style=${{cursor:"pointer",color:C.accent}} onClick=${()=>setView("list")}>Αθλητές</span>${" › "}<span style=${{color:C.text}}>${athlete.name}</span></div>`}
      </div>
      <div style=${{maxWidth:1150,margin:"0 auto",padding:"28px 32px"}}>
        ${view==="list"&&html`<${AthleteList} onSelect=${a=>{setAthlete(a);setView("profile");}} onNew=${()=>setView("new")}/>`}
        ${view==="new"&&html`<${AthleteForm} onSave=${a=>{setAthlete(a);showToast("Αθλητής αποθηκεύτηκε");setView("profile");}} onCancel=${()=>setView("list")}/>`}
        ${view==="edit"&&athlete&&html`<${AthleteForm} athlete=${athlete} onSave=${a=>{setAthlete(a);showToast("Στοιχεία ενημερώθηκαν");setView("profile");}} onCancel=${()=>setView("profile")}/>`}
        ${view==="profile"&&athlete&&html`<${AthleteProfile} athlete=${athlete} onBack=${()=>setView("list")} onNewMeasurement=${()=>setView("meas")} onNewMultiSpeed=${()=>setView("multispeed")} onEdit=${()=>setView("edit")} showToast=${showToast}/>`}
        ${view==="meas"&&athlete&&html`<${MeasurementInput} athlete=${athlete} onSave=${()=>{showToast("Μέτρηση αποθηκεύτηκε");setView("profile");}} onCancel=${()=>setView("profile")}/>`}
        ${view==="multispeed"&&athlete&&html`<${MultiSpeedInput} athlete=${athlete} onSave=${()=>{showToast("Session αποθηκεύτηκε ✅");setView("profile");}} onCancel=${()=>setView("profile")}/>`}
      </div>
      <${Toast} msg=${toast?.msg} type=${toast?.type}/>
    </div>`;
}

render(h(App,null),document.getElementById("root"));
  </script>
