// ── SUPABASE REST CLIENT (no library needed) ──────────────────────────────────
const db = {
  _h: { "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":`Bearer ${SB_KEY}` },
  async select(table, query="*", filters={}) {
    let url = `${SB_URL}/rest/v1/${table}?select=${query}`;
    Object.entries(filters).forEach(([k,v]) => url += `&${k}=eq.${v}`);
    url += "&order=name.asc";
    const r = await fetch(url, { headers: {...this._h, "Prefer":"return=representation"} });
    return r.json();
  },
  async selectWithJoin(table, query, filters={}, order="test_date.desc") {
    let url = `${SB_URL}/rest/v1/${table}?select=${query}`;
    Object.entries(filters).forEach(([k,v]) => url += `&${k}=eq.${v}`);
    url += `&order=${order}`;
    const r = await fetch(url, { headers: {...this._h, "Prefer":"return=representation"} });
    return r.json();
  },
  async insert(table, payload) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method:"POST", headers:{...this._h,"Prefer":"return=representation"},
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    return Array.isArray(data) ? data[0] : data;
  },
  async update(table, payload, id) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:"PATCH", headers:{...this._h,"Prefer":"return=representation"},
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    return Array.isArray(data) ? data[0] : data;
  }
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const cov_c  = v => v==null?"muted":v<0.15?"green":v<0.25?"yellow":"red";
const lsi_c  = v => v==null?"muted":v>=90?"green":v>=80?"yellow":"red";
const hq_c   = v => v==null?"muted":v>=55?"green":v>=45?"yellow":"red";
const def_c  = v => v==null?"muted":Math.abs(v)<=10?"green":Math.abs(v)<=20?"yellow":"red";
const calcLSI= (a,b)=>(!a||!b)?null:Math.round((Math.min(a,b)/Math.max(a,b))*100);
const calcHQ = (f,e)=>(!f||!e)?null:Math.round((f/e)*100);
const calcDef= (r,l)=>(!r||!l)?null:Math.round(((l-r)/l)*100);

function Spinner(){return <span style={{display:"inline-block",width:16,height:16,border:"2px solid #252a38",borderTop:"2px solid #4f8ef7",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>;}

function SecTitle({children}){return <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}><div style={{width:3,height:14,background:C.accent,borderRadius:2}}/><span style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted}}>{children}</span></div>;}
function Bdg({txt,color}){

}
function Val({v,cls="",unit=""}){return <span className={`mono ${cls}`}>{v!=null?`${v}${unit}`:"—"}</span>;}

}
function Lbl({t}){return <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>{t}</div>;}

// ── ANALYSIS ──────────────────────────────────────────────────────────────────
function analyze(results){
  const r  = results.find(x=>x.side==="right"&&x.muscle_group==="extensors");
  const l  = results.find(x=>x.side==="left" &&x.muscle_group==="extensors");
  const rf = results.find(x=>x.side==="right"&&x.muscle_group==="flexors");
  const lf = results.find(x=>x.side==="left" &&x.muscle_group==="flexors");
  const flags=[];
  const lsi_ext=calcLSI(r?.peak_torque,l?.peak_torque);
  const lsi_flex=calcLSI(rf?.peak_torque,lf?.peak_torque);
  const lsi_work=calcLSI(r?.work_per_rep,l?.work_per_rep);
  const lsi_pwr=calcLSI(r?.avg_power,l?.avg_power);
  const hq_r=calcHQ(rf?.peak_torque,r?.peak_torque);
  const hq_l=calcHQ(lf?.peak_torque,l?.peak_torque);
  [r,l,rf,lf].forEach(x=>{
    if(!x) return;
    const s=x.side==="right"?"Δεξί":"Αριστερό", g=x.muscle_group==="extensors"?"Εκτ.":"Κάμπτ.";
    if(x.pt_cov>0.25) flags.push({t:"red",m:`CoV PT ${s} ${g}: ${x.pt_cov} — Μη αξιόπιστο`});
    else if(x.pt_cov>0.15) flags.push({t:"yellow",m:`CoV PT ${s} ${g}: ${x.pt_cov} — Μέτρια μεταβλητότητα`});
    if(x.rom_cov>0.30) flags.push({t:"yellow",m:`CoV ROM ${s} ${g}: ${x.rom_cov} — Ασταθής θέση`});
  });
  if(lsi_ext!=null&&lsi_ext<90) flags.push({t:lsi_ext<80?"red":"yellow",m:`LSI Εκτ.: ${lsi_ext}% — κατώφλι RTS 90%`});
  if(lsi_flex!=null&&lsi_flex<90) flags.push({t:lsi_flex<80?"red":"yellow",m:`LSI Κάμπτ.: ${lsi_flex}% — κατώφλι RTS 90%`});
  if(hq_r!=null&&hq_r<50) flags.push({t:"red",m:`H/Q Δεξί: ${hq_r}% — Κρίσιμα χαμηλό`});
  else if(hq_r!=null&&hq_r<55) flags.push({t:"yellow",m:`H/Q Δεξί: ${hq_r}% — Οριακά χαμηλό`});
  if(hq_l!=null&&hq_l<50) flags.push({t:"red",m:`H/Q Αριστ.: ${hq_l}% — Κρίσιμα χαμηλό`});
  else if(hq_l!=null&&hq_l<55) flags.push({t:"yellow",m:`H/Q Αριστ.: ${hq_l}% — Οριακά χαμηλό`});
  return {lsi_ext,lsi_flex,lsi_work,lsi_pwr,hq_r,hq_l,flags,r,l,rf,lf};
}

// ── PDF PARSER ────────────────────────────────────────────────────────────────
async function parsePDF(base64){
  const prompt=`Extract ALL isokinetic data from this Cybex HUMAC NORM report. Return ONLY valid JSON no markdown.
{"athlete_name":"","athlete_id":"","test_date":"YYYY-MM-DD","joint":"knee","protocol":"con_con","speed_deg_s":60,"reps":5,"gravity_corrected":true,"results":[{"side":"right","muscle_group":"extensors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"work_bw":0,"avg_power":0,"power_cov":0,"power_bw":0,"joint_angle_peak":0,"joint_angle_cov":0,"rom":0,"rom_cov":0,"time_to_peak":0,"time_to_peak_cov":0,"time_peak_held":0,"force_decay":0,"reciprocal_delay":0,"delay_time":0}]}`;
  const resp=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
  const data=await resp.json();
  const text=data.content?.find(b=>b.type==="text")?.text||"";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

// ── ATHLETE FORM ──────────────────────────────────────────────────────────────
function AthleteForm({athlete,onSave,onCancel}){
  const [f,setF]=useState(athlete||{name:"",dob:"",gender:"",weight_kg:"",height_cm:"",sport:"",notes:""});
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!f.name) return;
    setSaving(true);
    const p={...f,weight_kg:+f.weight_kg||null,height_cm:+f.height_cm||null};
    let result;
    if(athlete?.id) result=await db.update("athletes",p,athlete.id);
    else result=await db.insert("athletes",p);
    setSaving(false);
    onSave(result||{...p});
  };
  return(
    <div className="fi">
      <div style={{marginBottom:20}}><div style={{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>{athlete?"Επεξεργασία":"Νέος Αθλητής"}</div><div style={{fontSize:22,fontWeight:700}}>{f.name||"Αθλητής"}</div></div>
      <Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{gridColumn:"1/-1"}}><Lbl t="Ονοματεπώνυμο *"/><input value={f.name} onChange={e=>set("name",e.target.value)} placeholder="π.χ. Παπαδόπουλος Γιώργος"/></div>
          <div><Lbl t="Ημ. Γέννησης"/><input type="date" value={f.dob} onChange={e=>set("dob",e.target.value)}/></div>
          <div><Lbl t="Φύλο"/><select value={f.gender} onChange={e=>set("gender",e.target.value)}><option value="">—</option><option value="male">Άνδρας</option><option value="female">Γυναίκα</option></select></div>
          <div><Lbl t="Βάρος (kg)"/><input type="number" value={f.weight_kg} onChange={e=>set("weight_kg",e.target.value)} placeholder="75"/></div>
          <div><Lbl t="Ύψος (cm)"/><input type="number" value={f.height_cm} onChange={e=>set("height_cm",e.target.value)} placeholder="175"/></div>
          <div style={{gridColumn:"1/-1"}}><Lbl t="Άθλημα"/><input value={f.sport} onChange={e=>set("sport",e.target.value)} placeholder="π.χ. Ποδόσφαιρο"/></div>
          <div style={{gridColumn:"1/-1"}}><Lbl t="Σημειώσεις"/><textarea value={f.notes} onChange={e=>set("notes",e.target.value)} rows={2} placeholder="Ιστορικό τραυματισμών..."/></div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button onClick={save} disabled={saving} style={{background:C.accent,color:"white",padding:"9px 20px"}}>{saving?<Spinner/>:"Αποθήκευση"}</button>
          <button onClick={onCancel} style={{background:C.bg3,color:C.muted,padding:"9px 20px"}}>Ακύρωση</button>
        </div>
      </Card>
    </div>
  );
}

// ── MEASUREMENT INPUT ─────────────────────────────────────────────────────────
function MeasurementInput({athlete,onSave,onCancel}){
  const [mode,setMode]=useState("upload");
  const [parsing,setParsing]=useState(false);
  const [parsed,setParsed]=useState(null);
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState("");
  const [meta,setMeta]=useState({test_date:new Date().toISOString().split("T")[0],joint:"knee",protocol:"con_con",speed_deg_s:60,reps:5,gravity_corrected:true,notes:""});
  const setM=(k,v)=>setMeta(p=>({...p,[k]:v}));

  const handleFile=async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    setParsing(true); setError("");
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const data=await parsePDF(b64);
      setParsed(data);
      setMeta(m=>({...m,test_date:data.test_date||m.test_date,joint:data.joint||m.joint,protocol:data.protocol||m.protocol,speed_deg_s:data.speed_deg_s||m.speed_deg_s,reps:data.reps||m.reps}));
    }catch(err){setError("Σφάλμα: "+err.message);}
    setParsing(false);
  };

  const saveMeas=async(results)=>{
    setSaving(true);
    try{
      const meas=await db.insert("measurements",{athlete_id:athlete.id,...meta,speed_deg_s:+meta.speed_deg_s,reps:+meta.reps,raw_json:parsed||null,source:mode==="upload"?"pdf_upload":"manual"});

      for(const row of results){await db.insert("test_results",{measurement_id:meas.id,...row});}

    setSaving(false);

  return(

          ):(
            <div>
              <div style={{color:C.green,marginBottom:16,fontWeight:600}}>✅ PDF αναλύθηκε — {parsed.results?.length} αποτελέσματα</div>
              <Card style={{background:C.bg3,padding:0,marginBottom:16}}>
                <table>
                  <thead><tr><th>Ομάδα</th><th>Πλευρά</th><th>Peak Torque</th><th>CoV</th><th>%BW</th><th>Work</th><th>Power</th></tr></thead>
                  <tbody>{parsed.results?.map((r,i)=>(
                    <tr key={i}>
                      <td style={{textTransform:"capitalize"}}>{r.muscle_group}</td>
                      <td className="muted">{r.side==="right"?"Δεξί":"Αριστ."}</td>
                      <td className={`mono ${r.pt_cov>0.25?"red":r.pt_cov>0.15?"yellow":"green"}`}>{r.peak_torque} Nm</td>
                      <td><Bdg txt={r.pt_cov} color={cov_c(r.pt_cov)}/></td>
                      <td className="mono muted">{r.pt_bw}%</td>
                      <td className="mono">{r.work_per_rep}</td>
                      <td className="mono">{r.avg_power}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </Card>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>saveMeas(parsed.results)} disabled={saving} style={{background:C.green,color:"#0d0f14",padding:"9px 20px",fontWeight:600}}>{saving?<Spinner/>:"Αποθήκευση"}</button>
                <button onClick={()=>setParsed(null)} style={{background:C.bg3,color:C.muted,padding:"9px 20px"}}>Νέο PDF</button>
                <button onClick={onCancel} style={{background:C.bg3,color:C.muted,padding:"9px 20px"}}>Ακύρωση</button>
              </div>
            </div>
          )}
        </Card>
      ):(
        <div>
          {rows.map((row,i)=>(
            <Card key={i} style={{marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:600,color:C.accent,marginBottom:12,textTransform:"uppercase"}}>{row.side==="right"?"🔴 Δεξί":"🔵 Αριστερό"} — {row.muscle_group}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                {[["peak_torque","Peak Torque (Nm)"],["pt_cov","CoV PT"],["pt_bw","%BW"],["work_per_rep","Work (Nm)"],["work_cov","CoV Work"],["avg_power","Power (W)"],["power_cov","CoV Power"],["joint_angle_peak","Angle (°)"],["rom","ROM (°)"],["rom_cov","CoV ROM"],["time_to_peak","Time Peak (s)"],["force_decay","Force Decay (s)"]].map(([k,l])=>(
                  <div key={k}><Lbl t={l}/><input type="number" step="0.01" value={row[k]} onChange={e=>setVal(i,k,e.target.value)} placeholder="—"/></div>
                ))}
              </div>
            </Card>
          ))}
          {error&&<div style={{color:C.red,marginBottom:8,fontSize:12}}>{error}</div>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={submitManual} disabled={saving} style={{background:C.green,color:"#0d0f14",padding:"9px 20px",fontWeight:600}}>{saving?<Spinner/>:"Αποθήκευση"}</button>
            <button onClick={onCancel} style={{background:C.bg3,color:C.muted,padding:"9px 20px"}}>Ακύρωση</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ANALYSIS VIEW ─────────────────────────────────────────────────────────────
function AnalysisView({measurements,selected}){
  const meas=measurements.find(m=>selected.includes(m.id))||measurements[0];
  if(!meas) return <div style={{color:C.muted,padding:20}}>Επίλεξε μέτρηση από το Ιστορικό.</div>;
  const {lsi_ext,lsi_flex,lsi_work,lsi_pwr,hq_r,hq_l,flags,r,l,rf,lf}=analyze(meas.test_results||[]);
  return(
    <div className="fi">
      {flags.length>0&&<div style={{marginBottom:16}}>{flags.map((f,i)=><div key={i} style={{background:f.t==="red"?"rgba(242,95,92,0.08)":"rgba(245,200,66,0.08)",border:`1px solid ${f.t==="red"?C.red:C.yellow}`,borderRadius:8,padding:"8px 14px",marginBottom:6,color:f.t==="red"?C.red:C.yellow,fontSize:12,fontWeight:500}}>⚠ {f.m}</div>)}</div>}
      <SecTitle>Limb Symmetry Index & H/Q Ratio</SecTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {[["LSI PT Εκτ.",lsi_ext,"≥90%",false],["LSI PT Κάμπτ.",lsi_flex,"≥90%",false],["LSI Work",lsi_work,"≥90%",false],["LSI Power",lsi_pwr,"≥90%",false],["H/Q Δεξί",hq_r,"55-65%",true],["H/Q Αριστ.",hq_l,"55-65%",true]].map(([lbl,val,norm,isHQ])=>(
          <Card key={lbl} style={{textAlign:"center"}}>
            <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{lbl}</div>
            <div className={`mono ${isHQ?hq_c(val):lsi_c(val)}`} style={{fontSize:26,fontWeight:700}}>{val!=null?`${val}%`:"—"}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:4}}>Φυσιολ. {norm}</div>
          </Card>
        ))}
      </div>
      <SecTitle>Αναλυτικά Αποτελέσματα</SecTitle>
      <Card style={{padding:0,marginBottom:16}}>
        <table>
          <thead><tr><th>Παράμετρος</th><th>Δεξί Εκτ.</th><th>Αριστ. Εκτ.</th><th>Deficit</th><th>Δεξί Κάμπτ.</th><th>Αριστ. Κάμπτ.</th><th>Deficit</th></tr></thead>
          <tbody>
            {[["Peak Torque (Nm)","peak_torque",""],["CoV PT","pt_cov",""],["% BW","pt_bw","%"],["Work/Rep (Nm)","work_per_rep",""],["Avg Power (W)","avg_power",""],["ROM (°)","rom","°"],["CoV ROM","rom_cov",""],["Angle@Peak (°)","joint_angle_peak","°"],["Time to Peak (s)","time_to_peak","s"],["Force Decay (s)","force_decay","s"]].map(([lbl,key,unit])=>{
              const de=calcDef(r?.[key],l?.[key]), df=calcDef(rf?.[key],lf?.[key]);
              const isCov=key.includes("cov");
              return(<tr key={key}>
                <td className="muted" style={{fontSize:12}}>{lbl}</td>
                <td><Val v={r?.[key]} cls={isCov?cov_c(r?.[key]):""} unit={unit}/></td>
                <td><Val v={l?.[key]} cls={isCov?cov_c(l?.[key]):""} unit={unit}/></td>
                <td>{de!=null&&<Bdg txt={`${de>0?"+":""}${de}%`} color={def_c(de)}/>}</td>
                <td><Val v={rf?.[key]} cls={isCov?cov_c(rf?.[key]):""} unit={unit}/></td>
                <td><Val v={lf?.[key]} cls={isCov?cov_c(lf?.[key]):""} unit={unit}/></td>
                <td>{df!=null&&<Bdg txt={`${df>0?"+":""}${df}%`} color={def_c(df)}/>}</td>
              </tr>);
            })}
          </tbody>
        </table>
      </Card>
      <button onClick={()=>window.print()} className="np" style={{background:C.bg3,color:C.muted,padding:"8px 18px",border:`1px solid ${C.border}`}}>🖨 Εκτύπωση</button>
    </div>
  );
}

// ── COMPARE VIEW ──────────────────────────────────────────────────────────────
function CompareView({measurements}){
  const [t1id,setT1id]=useState(measurements[1]?.id||"");
  const [t2id,setT2id]=useState(measurements[0]?.id||"");
  if(measurements.length<2) return <Card style={{textAlign:"center",padding:40,color:C.muted}}><div style={{fontSize:32,marginBottom:12}}>📈</div><div>Χρειάζονται τουλάχιστον 2 μετρήσεις.</div></Card>;
  const t1=measurements.find(m=>m.id===t1id);
  const t2=measurements.find(m=>m.id===t2id);
  const gv=(m,s,g,k)=>m?.test_results?.find(r=>r.side===s&&r.muscle_group===g)?.[k];
  const delta=(a,b)=>(a!=null&&b!=null)?Math.round(((b-a)/Math.abs(a))*100):null;
  const an1=analyze(t1?.test_results||[]), an2=analyze(t2?.test_results||[]);
  const prows=[{lbl:"PT Εκτ. Δεξί (Nm)",s:"right",g:"extensors",k:"peak_torque"},{lbl:"PT Εκτ. Αριστ. (Nm)",s:"left",g:"extensors",k:"peak_torque"},{lbl:"PT Κάμπτ. Δεξί (Nm)",s:"right",g:"flexors",k:"peak_torque"},{lbl:"PT Κάμπτ. Αριστ. (Nm)",s:"left",g:"flexors",k:"peak_torque"},{lbl:"Work Εκτ. Δεξί",s:"right",g:"extensors",k:"work_per_rep"},{lbl:"Power Εκτ. Δεξί",s:"right",g:"extensors",k:"avg_power"}];
  return(
    <div className="fi">
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:16,marginBottom:20,alignItems:"center"}}>
        <div><Lbl t="ΜΕΤΡΗΣΗ 1 (Βάση)"/><select value={t1id} onChange={e=>setT1id(e.target.value)}>{measurements.map(m=><option key={m.id} value={m.id}>{m.test_date} — {m.notes||m.protocol}</option>)}</select></div>
        <div style={{color:C.border,fontSize:20,textAlign:"center",paddingTop:20}}>→</div>
        <div><Lbl t="ΜΕΤΡΗΣΗ 2 (Νεότερη)"/><select value={t2id} onChange={e=>setT2id(e.target.value)}>{measurements.map(m=><option key={m.id} value={m.id}>{m.test_date} — {m.notes||m.protocol}</option>)}</select></div>
      </div>
      {t1&&t2&&t1.gravity_corrected!==t2.gravity_corrected&&<div style={{background:"rgba(245,200,66,0.08)",border:`1px solid ${C.yellow}`,borderRadius:8,padding:"10px 16px",marginBottom:16,color:C.yellow,fontSize:12}}>⚠ Διαφορά gravity correction — σύγκριση μπορεί να είναι παραπλανητική</div>}
      <SecTitle>Σύγκριση Παραμέτρων</SecTitle>
      <Card style={{padding:0,marginBottom:16}}>
        <table>
          <thead><tr><th>Παράμετρος</th><th>{t1?.test_date||"T1"}</th><th>{t2?.test_date||"T2"}</th><th>Μεταβολή</th></tr></thead>
          <tbody>{prows.map(({lbl,s,g,k})=>{const v1=gv(t1,s,g,k),v2=gv(t2,s,g,k),d=delta(v1,v2);return(<tr key={lbl}><td className="muted" style={{fontSize:12}}>{lbl}</td><td className="mono">{v1??"—"}</td><td className="mono">{v2??"—"}</td><td>{d!=null&&<Bdg txt={`${d>0?"+":""}${d}%`} color={d>=0?"green":"red"}/>}</td></tr>);})}</tbody>
        </table>
      </Card>
      <SecTitle>LSI & H/Q — Εξέλιξη</SecTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        {[["LSI PT Εκτ.",an1.lsi_ext,an2.lsi_ext],["LSI PT Κάμπτ.",an1.lsi_flex,an2.lsi_flex],["H/Q Δεξί",an1.hq_r,an2.hq_r],["H/Q Αριστ.",an1.hq_l,an2.hq_l],["LSI Work",an1.lsi_work,an2.lsi_work],["LSI Power",an1.lsi_pwr,an2.lsi_pwr]].map(([lbl,v1,v2])=>{
          const d=delta(v1,v2);
          return(<Card key={lbl} style={{textAlign:"center"}}>
            <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{lbl}</div>
            <div style={{display:"flex",justifyContent:"center",gap:10,alignItems:"center"}}>
              <span className="mono muted" style={{fontSize:14}}>{v1??"—"}%</span>
              <span style={{color:C.border}}>→</span>
              <span className={`mono ${lsi_c(v2)}`} style={{fontSize:20,fontWeight:700}}>{v2??"—"}%</span>
            </div>
            {d!=null&&<div style={{marginTop:6}}><Bdg txt={`${d>0?"+":""}${d}%`} color={d>=0?"green":"red"}/></div>}
          </Card>);
        })}
      </div>
    </div>
  );
}

// ── ATHLETE PROFILE ───────────────────────────────────────────────────────────
function AthleteProfile({athlete,onBack,onNewMeasurement}){
  const [measurements,setMeasurements]=useState([]);
  const [selected,setSelected]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("history");
  const load=useCallback(async()=>{
    setLoading(true);
    const data=await db.selectWithJoin("measurements","*,test_results(*)",{athlete_id:athlete.id});
    setMeasurements(Array.isArray(data)?data:[]);
    setLoading(false);
  },[athlete.id]);
  useEffect(()=>{load();},[load]);
  const toggle=(id)=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id].slice(-2));
  const age=athlete.dob?Math.floor((new Date()-new Date(athlete.dob))/31557600000):null;
  return(
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <button onClick={onBack} style={{background:"none",color:C.muted,fontSize:12,padding:"4px 0",marginBottom:8}}>← Πίσω</button>
          <div style={{fontSize:22,fontWeight:700}}>{athlete.name}</div>
          <div style={{color:C.muted,fontSize:13,marginTop:2}}>{[age&&`${age} ετών`,athlete.gender==="male"?"Άνδρας":athlete.gender==="female"?"Γυναίκα":null,athlete.weight_kg&&`${athlete.weight_kg}kg`,athlete.height_cm&&`${athlete.height_cm}cm`,athlete.sport].filter(Boolean).join(" · ")}</div>
          {athlete.notes&&<div style={{fontSize:12,color:C.muted,marginTop:4,fontStyle:"italic"}}>{athlete.notes}</div>}
        </div>
        <button onClick={onNewMeasurement} style={{background:C.accent,color:"white",padding:"9px 18px"}}>+ Νέα Μέτρηση</button>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:20,borderBottom:`1px solid ${C.border}`}}>
        {[["history","Ιστορικό"],["analysis","Ανάλυση"],["compare","Σύγκριση"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{padding:"8px 18px",background:"none",color:tab===v?C.accent:C.muted,borderBottom:tab===v?`2px solid ${C.accent}`:"2px solid transparent",borderRadius:0,fontWeight:tab===v?600:400}}>{l}</button>
        ))}
      </div>
      {loading?<div style={{textAlign:"center",padding:40}}><Spinner/></div>:(
        <>
          {tab==="history"&&(
            <div>
              {selected.length>0&&<div style={{background:"rgba(79,142,247,0.08)",border:`1px solid ${C.accent}`,borderRadius:8,padding:"10px 16px",marginBottom:16,fontSize:12,color:C.accent}}>{selected.length===1?"1 μέτρηση επιλεγμένη — πάτα Ανάλυση":"2 μετρήσεις — πάτα Σύγκριση"}</div>}
              {measurements.length===0?(
                <Card style={{textAlign:"center",padding:40,color:C.muted}}><div style={{fontSize:32,marginBottom:12}}>📊</div><div>Δεν υπάρχουν μετρήσεις.</div></Card>
              ):(
                <Card style={{padding:0}}>
                  <table>
                    <thead><tr><th></th><th>Ημερομηνία</th><th>Άρθρωση</th><th>Πρωτόκολλο</th><th>°/s</th><th>Gravity</th><th>Πηγή</th><th></th></tr></thead>
                    <tbody>{measurements.map(m=>(
                      <tr key={m.id}>
                        <td><input type="checkbox" checked={selected.includes(m.id)} onChange={()=>toggle(m.id)} style={{width:"auto"}}/></td>
                        <td style={{fontWeight:600}}>{m.test_date}</td>
                        <td style={{textTransform:"capitalize"}}>{m.joint}</td>
                        <td><Bdg txt={m.protocol} color="muted"/></td>
                        <td className="mono muted">{m.speed_deg_s}</td>
                        <td>{m.gravity_corrected?<span className="green">✓</span>:<span className="red">✗</span>}</td>
                        <td className="muted" style={{fontSize:11}}>{m.source==="pdf_upload"?"PDF":"Manual"}</td>
                        <td><button onClick={()=>{setSelected([m.id]);setTab("analysis");}} style={{background:C.bg3,color:C.accent,padding:"4px 12px",fontSize:12}}>Ανάλυση →</button></td>
                      </tr>
                    ))}</tbody>
                  </table>
                </Card>
              )}
            </div>
          )}
          {tab==="analysis"&&<AnalysisView measurements={measurements} selected={selected}/>}
          {tab==="compare"&&<CompareView measurements={measurements}/>}
        </>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("list");
  const [athlete,setAthlete]=useState(null);
  const [toast,setToast]=useState(null);
  const toast_=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <style>{css}</style>
      <div className="np" style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:"14px 32px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>setView("list")}>
          <div style={{width:36,height:36,background:C.accent,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚡</div>
          <div><div style={{fontWeight:700,fontSize:15}}>360 Ergometric Tests</div><div style={{fontSize:11,color:C.muted}}>Isokinetic Assessment Platform</div></div>
        </div>
        {athlete&&view!=="list"&&<div style={{fontSize:12,color:C.muted}}><span style={{cursor:"pointer",color:C.accent}} onClick={()=>setView("list")}>Αθλητές</span>{" › "}<span style={{color:C.text}}>{athlete.name}</span></div>}
      </div>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"28px 32px"}}>
        {view==="list"&&<AthleteList onSelect={a=>{setAthlete(a);setView("profile");}} onNew={()=>setView("new")}/>}
        {view==="new"&&<AthleteForm onSave={a=>{setAthlete(a);toast_("Αθλητής αποθηκεύτηκε");setView("profile");}} onCancel={()=>setView("list")}/>}
        {view==="profile"&&athlete&&<AthleteProfile athlete={athlete} onBack={()=>setView("list")} onNewMeasurement={()=>setView("meas")}/>}
        {view==="meas"&&athlete&&<MeasurementInput athlete={athlete} onSave={()=>{toast_("Μέτρηση αποθηκεύτηκε");setView("profile");}} onCancel={()=>setView("profile")}/>}
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
