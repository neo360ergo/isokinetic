// ── ANALYSIS ENGINE ───────────────────────────────────────────────────────────
function analyze(results,gender=""){
  const r =results.find(x=>x.side==="right"&&x.muscle_group==="extensors");
  const l =results.find(x=>x.side==="left" &&x.muscle_group==="extensors");
  const rf=results.find(x=>x.side==="right"&&x.muscle_group==="flexors");
  const lf=results.find(x=>x.side==="left" &&x.muscle_group==="flexors");
  const flags=[];
  const lsi_ext=calcLSI(r?.peak_torque,l?.peak_torque);
  const lsi_flex=calcLSI(rf?.peak_torque,lf?.peak_torque);
  const lsi_work=calcLSI(r?.work_per_rep,l?.work_per_rep);
  const lsi_pwr=calcLSI(r?.avg_power,l?.avg_power);
  const hq_r=calcHQ(rf?.peak_torque,r?.peak_torque);
  const hq_l=calcHQ(lf?.peak_torque,l?.peak_torque);
  const norm=NORMS[gender]||null;
  [r,l,rf,lf].forEach(x=>{
    if(!x)return;
    const s=x.side==="right"?"Δεξί":"Αριστ.",g=x.muscle_group==="extensors"?"Εκτ.":"Κάμπτ.";
    if(x.pt_cov>0.25)flags.push({t:"red",m:`CoV PT ${s} ${g}: ${x.pt_cov} — Μη αξιόπιστο αποτέλεσμα`});
    else if(x.pt_cov>0.15)flags.push({t:"yellow",m:`CoV PT ${s} ${g}: ${x.pt_cov} — Μέτρια μεταβλητότητα`});
    if(x.rom_cov>0.30)flags.push({t:"yellow",m:`CoV ROM ${s} ${g}: ${x.rom_cov} — Ασταθής αρχική θέση`});
  });
  if(lsi_ext!=null&&lsi_ext<90)flags.push({t:lsi_ext<80?"red":"yellow",m:`LSI Εκτ.: ${lsi_ext}% — κατώφλι RTS 90%`});
  if(lsi_flex!=null&&lsi_flex<90)flags.push({t:lsi_flex<80?"red":"yellow",m:`LSI Κάμπτ.: ${lsi_flex}% — κατώφλι RTS 90%`});
  if(hq_r!=null&&hq_r<50)flags.push({t:"red",m:`H/Q Δεξί: ${hq_r}% — Κρίσιμα χαμηλό (φυσιολ. 55-65%)`});
  else if(hq_r!=null&&hq_r<55)flags.push({t:"yellow",m:`H/Q Δεξί: ${hq_r}% — Οριακά χαμηλό`});
  if(hq_l!=null&&hq_l<50)flags.push({t:"red",m:`H/Q Αριστ.: ${hq_l}% — Κρίσιμα χαμηλό`});
  else if(hq_l!=null&&hq_l<55)flags.push({t:"yellow",m:`H/Q Αριστ.: ${hq_l}% — Οριακά χαμηλό`});
  if(norm&&r?.pt_bw!=null&&r.pt_bw<norm.ext_bw[0])flags.push({t:"yellow",m:`%BW Εκτ. Δεξί: ${r.pt_bw}% — κάτω από norm (${norm.ext_bw[0]}-${norm.ext_bw[1]}%)`});
  if(norm&&l?.pt_bw!=null&&l.pt_bw<norm.ext_bw[0])flags.push({t:"yellow",m:`%BW Εκτ. Αριστ.: ${l.pt_bw}% — κάτω από norm`});
  return {lsi_ext,lsi_flex,lsi_work,lsi_pwr,hq_r,hq_l,flags,r,l,rf,lf,norm};
}

function rtsScore(an){
  const checks=[
    {label:"LSI PT Εκτ. ≥90%",pass:an.lsi_ext!=null&&an.lsi_ext>=90,val:an.lsi_ext!=null?an.lsi_ext+"%":"—"},
    {label:"LSI PT Κάμπτ. ≥90%",pass:an.lsi_flex!=null&&an.lsi_flex>=90,val:an.lsi_flex!=null?an.lsi_flex+"%":"—"},
    {label:"LSI Work ≥90%",pass:an.lsi_work!=null&&an.lsi_work>=90,val:an.lsi_work!=null?an.lsi_work+"%":"—"},
    {label:"LSI Power ≥90%",pass:an.lsi_pwr!=null&&an.lsi_pwr>=90,val:an.lsi_pwr!=null?an.lsi_pwr+"%":"—"},
    {label:"H/Q Δεξί ≥55%",pass:an.hq_r!=null&&an.hq_r>=55,val:an.hq_r!=null?an.hq_r+"%":"—"},
    {label:"H/Q Αριστ. ≥55%",pass:an.hq_l!=null&&an.hq_l>=55,val:an.hq_l!=null?an.hq_l+"%":"—"},
    {label:"CoV PT <0.15",pass:an.r?.pt_cov!=null&&an.r.pt_cov<0.15&&an.rf?.pt_cov!=null&&an.rf.pt_cov<0.15,val:an.r?.pt_cov??"-"},
  ];
  const passed=checks.filter(c=>c.pass).length;
  return {checks,passed,total:checks.length,pct:Math.round((passed/checks.length)*100)};
}

// ── PDF PARSER ────────────────────────────────────────────────────────────────
async function parsePDF(base64){
  const prompt=`Extract ALL isokinetic data from this Cybex HUMAC NORM PDF. Return ONLY valid JSON, no markdown.
{"athlete_name":"","test_date":"YYYY-MM-DD","joint":"knee","protocol":"con_con","speed_deg_s":60,"reps":5,"gravity_corrected":true,"results":[{"side":"right","muscle_group":"extensors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"work_bw":0,"avg_power":0,"power_cov":0,"power_bw":0,"joint_angle_peak":0,"joint_angle_cov":0,"rom":0,"rom_cov":0,"time_to_peak":0,"time_to_peak_cov":0,"time_peak_held":0,"force_decay":0,"reciprocal_delay":0,"delay_time":0}]}`;
  const resp=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
  const data=await resp.json();
  const text=data.content?.find(b=>b.type==="text")?.text||"";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────────
function exportExcel(athlete,measurements){
  const wb=XLSX.utils.book_new();
  // Sheet 1: Summary
  const summaryData=[
    ["360 Ergometric Tests — Isokinetic Assessment"],
    [],
    ["Athlete",athlete.name,"Gender",athlete.gender==="male"?"Male":"Female"],
    ["DOB",athlete.dob,"Sport",athlete.sport||""],
    ["Weight (kg)",athlete.weight_kg||"","Height (cm)",athlete.height_cm||""],
    [],
    ["Date","Joint","Protocol","Speed °/s","Side","Group","Peak Torque (Nm)","CoV PT","%BW","Work (Nm)","CoV Work","Power (W)","ROM (°)","CoV ROM","Angle@Peak (°)","Time Peak (s)","Force Decay (s)","H/Q Right","H/Q Left","LSI Ext PT","LSI Flex PT","LSI Work"],
  ];
  measurements.forEach(m=>{
    const results=m.test_results||[];
    const r =results.find(x=>x.side==="right"&&x.muscle_group==="extensors");
    const l =results.find(x=>x.side==="left" &&x.muscle_group==="extensors");
    const rf=results.find(x=>x.side==="right"&&x.muscle_group==="flexors");
    const lf=results.find(x=>x.side==="left" &&x.muscle_group==="flexors");
    const hq_r=calcHQ(rf?.peak_torque,r?.peak_torque);
    const hq_l=calcHQ(lf?.peak_torque,l?.peak_torque);
    const lsi_ext=calcLSI(r?.peak_torque,l?.peak_torque);
    const lsi_flex=calcLSI(rf?.peak_torque,lf?.peak_torque);
    const lsi_work=calcLSI(r?.work_per_rep,l?.work_per_rep);
    results.forEach(res=>{
      summaryData.push([m.test_date,m.joint,m.protocol,m.speed_deg_s,res.side,res.muscle_group,
        res.peak_torque,res.pt_cov,res.pt_bw,res.work_per_rep,res.work_cov,res.avg_power,
        res.rom,res.rom_cov,res.joint_angle_peak,res.time_to_peak,res.force_decay,
        hq_r,hq_l,lsi_ext,lsi_flex,lsi_work
      ]);
    });
  });
  const ws1=XLSX.utils.aoa_to_sheet(summaryData);
  ws1["!cols"]=[{wch:14},{wch:10},{wch:12},{wch:10},{wch:8},{wch:12},{wch:16},{wch:8},{wch:8},{wch:12},{wch:10},{wch:10},{wch:8},{wch:8},{wch:12},{wch:12},{wch:12},{wch:10},{wch:10},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws1,"Data");

  // Sheet 2: Timeline
  const timeData=[["Date","PT Ext R","PT Ext L","PT Flex R","PT Flex L","H/Q R","H/Q L","LSI Ext","LSI Flex","LSI Work","RTS Score %"]];
  [...measurements].sort((a,b)=>new Date(a.test_date)-new Date(b.test_date)).forEach(m=>{
    const results=m.test_results||[];
    const an=analyze(results,athlete.gender);
    const {passed,total}=rtsScore(an);
    timeData.push([m.test_date,
      an.r?.peak_torque,an.l?.peak_torque,an.rf?.peak_torque,an.lf?.peak_torque,
      an.hq_r,an.hq_l,an.lsi_ext,an.lsi_flex,an.lsi_work,
      Math.round((passed/total)*100)
    ]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(timeData);
  XLSX.utils.book_append_sheet(wb,ws2,"Timeline");

  XLSX.writeFile(wb,`${athlete.name.replace(/\s+/g,"_")}_Isokinetic_${new Date().toISOString().split("T")[0]}.xlsx`);
}

// ── CHART COMPONENT ───────────────────────────────────────────────────────────
function TrendCharts({measurements}){
  const ptRef=useRef(null),hqRef=useRef(null),lsiRef=useRef(null);
  const chartRefs=useRef({});
  useEffect(()=>{
    if(!measurements.length)return;
    const sorted=[...measurements].sort((a,b)=>new Date(a.test_date)-new Date(b.test_date));
    const labels=sorted.map(m=>m.test_date);
    const gv=(m,s,g,k)=>m.test_results?.find(r=>r.side===s&&r.muscle_group===g)?.[k]??null;
    const ds_pt=[
      {label:"Εκτ. Δεξί",data:sorted.map(m=>gv(m,"right","extensors","peak_torque")),borderColor:C.accent,tension:0.3,pointRadius:5,fill:false},
      {label:"Εκτ. Αριστ.",data:sorted.map(m=>gv(m,"left","extensors","peak_torque")),borderColor:"#a78bfa",tension:0.3,pointRadius:5,fill:false},
      {label:"Κάμπτ. Δεξί",data:sorted.map(m=>gv(m,"right","flexors","peak_torque")),borderColor:C.green,tension:0.3,pointRadius:5,fill:false},
      {label:"Κάμπτ. Αριστ.",data:sorted.map(m=>gv(m,"left","flexors","peak_torque")),borderColor:C.yellow,tension:0.3,pointRadius:5,fill:false},
    ];
    const ds_hq=[
      {label:"H/Q Δεξί",data:sorted.map(m=>{const f=gv(m,"right","flexors","peak_torque"),e=gv(m,"right","extensors","peak_torque");return(f&&e)?Math.round((f/e)*100):null;}),borderColor:C.accent,tension:0.3,pointRadius:5,fill:false},
      {label:"H/Q Αριστ.",data:sorted.map(m=>{const f=gv(m,"left","flexors","peak_torque"),e=gv(m,"left","extensors","peak_torque");return(f&&e)?Math.round((f/e)*100):null;}),borderColor:C.green,tension:0.3,pointRadius:5,fill:false},
    ];
    const ds_lsi=[
      {label:"LSI PT Εκτ.",data:sorted.map(m=>calcLSI(gv(m,"right","extensors","peak_torque"),gv(m,"left","extensors","peak_torque"))),borderColor:C.accent,tension:0.3,pointRadius:5,fill:false},
      {label:"LSI PT Κάμπτ.",data:sorted.map(m=>calcLSI(gv(m,"right","flexors","peak_torque"),gv(m,"left","flexors","peak_torque"))),borderColor:C.green,tension:0.3,pointRadius:5,fill:false},
      {label:"LSI Work",data:sorted.map(m=>calcLSI(gv(m,"right","extensors","work_per_rep"),gv(m,"left","extensors","work_per_rep"))),borderColor:C.yellow,tension:0.3,pointRadius:5,fill:false},
    ];
    const opts=(title,yLabel,min,max,refLine)=>({
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:C.muted,font:{size:11}}},title:{display:true,text:title,color:C.text,font:{size:13,weight:"600"}},
        annotation:refLine?{annotations:{l1:{type:"line",yMin:refLine,yMax:refLine,borderColor:"rgba(242,95,92,0.5)",borderWidth:1.5,borderDash:[5,5]}}}:{}},
      scales:{x:{ticks:{color:C.muted,font:{size:10}},grid:{color:"rgba(37,42,56,0.4)"}},
               y:{min,max,ticks:{color:C.muted,font:{size:10}},grid:{color:"rgba(37,42,56,0.4)"},title:{display:true,text:yLabel,color:C.muted,font:{size:10}}}}
    });
    [[ptRef,"pt",ds_pt,"Peak Torque (Nm)","Nm",0,null,null],
     [hqRef,"hq",ds_hq,"H/Q Ratio (%)","% ",40,100,55],
     [lsiRef,"lsi",ds_lsi,"Limb Symmetry Index (%)","% ",60,100,90]
    ].forEach(([ref,key,datasets,title,yLabel,min,max,refLine])=>{
      if(!ref.current)return;
      if(chartRefs.current[key])chartRefs.current[key].destroy();
      chartRefs.current[key]=new Chart(ref.current,{type:"line",data:{labels,datasets},options:opts(title,yLabel,min,max,refLine)});
    });
    return()=>Object.values(chartRefs.current).forEach(c=>c?.destroy());
  },[measurements]);
  if(measurements.length<2)return html`<${Card} style=${{textAlign:"center",padding:32,color:C.muted}}><div style=${{fontSize:28,marginBottom:8}}>📈</div><div>Χρειάζονται τουλάχιστον 2 μετρήσεις για γράφημα εξέλιξης.</div><//>`;
  return html`
    <div style=${{display:"flex",flexDirection:"column",gap:20}}>
      <${Card}><div style=${{height:220}}><canvas ref=${ptRef}/></div><//>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <${Card}><div style=${{height:200}}><canvas ref=${hqRef}/></div><//>
        <${Card}><div style=${{height:200}}><canvas ref=${lsiRef}/></div><//>
      </div>
    </div>`;
}

      ${flags.length>0&&html`<div style=${{marginBottom:16}}>${flags.map((f,i)=>html`<div key=${i} style=${{background:f.t==="red"?"rgba(242,95,92,0.08)":"rgba(245,200,66,0.08)",border:`1px solid ${f.t==="red"?C.red:C.yellow}`,borderRadius:8,padding:"8px 14px",marginBottom:6,color:f.t==="red"?C.red:C.yellow,fontSize:12,fontWeight:500}}>⚠ ${f.m}</div>`)}</div>`}

            <div style=${{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>${lbl}</div>

      <${RTSCard} an=${an}/>

      ${norm&&html`
        <${Card} style=${{marginBottom:16}}>
          <${Sec} t=${"Normative Data (" + (athlete?.gender==="male"?"Άνδρες":"Γυναίκες") + ", 60°/s)"}/>
          <div style=${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            ${[["%BW Εκτ. Δεξί",r?.pt_bw,norm.ext_bw],["%BW Εκτ. Αριστ.",l?.pt_bw,norm.ext_bw],["%BW Κάμπτ. Δεξί",rf?.pt_bw,norm.flex_bw],["%BW Κάμπτ. Αριστ.",lf?.pt_bw,norm.flex_bw]].map(([lbl,val,range])=>{

                <div style=${{fontSize:10,color:C.muted,marginBottom:4}}>${lbl}</div>
                <div class=${"mono "+c} style=${{fontSize:18,fontWeight:700}}>${val!=null?val+"%":"—"}</div>
                <div style=${{fontSize:9,color:C.muted,marginTop:2}}>Norm: ${range[0]}-${range[1]}%</div>
              </div>`;
            })}
          </div>
        <//>
      `}

      <${Sec} t="Αναλυτικά Αποτελέσματα"/>
      <${Card} style=${{padding:0,marginBottom:16}}>
        <table><thead><tr><th>Παράμετρος</th><th>Δεξί Εκτ.</th><th>Αριστ. Εκτ.</th><th>Deficit</th><th>Δεξί Κάμπτ.</th><th>Αριστ. Κάμπτ.</th><th>Deficit</th></tr></thead>
        <tbody>${[["Peak Torque (Nm)","peak_torque",""],["CoV PT","pt_cov",""],["% BW","pt_bw","%"],["Work/Rep (Nm)","work_per_rep",""],["CoV Work","work_cov",""],["Avg Power (W)","avg_power",""],["ROM (°)","rom","°"],["CoV ROM","rom_cov",""],["Angle@Peak (°)","joint_angle_peak","°"],["Time Peak (s)","time_to_peak","s"],["Force Decay (s)","force_decay","s"]].map(([lbl,key,unit])=>{
          const de=calcDef(r?.[key],l?.[key]),df=calcDef(rf?.[key],lf?.[key]),isCov=key.includes("cov");
          return html`<tr key=${key}><td class="muted" style=${{fontSize:12}}>${lbl}</td><td><${Val} v=${r?.[key]} cls=${isCov?cov_c(r?.[key]):""} unit=${unit}/></td><td><${Val} v=${l?.[key]} cls=${isCov?cov_c(l?.[key]):""} unit=${unit}/></td><td>${de!=null&&html`<${Bdg} txt=${(de>0?"+":"")+de+"%"} color=${def_c(de)}/>`}</td><td><${Val} v=${rf?.[key]} cls=${isCov?cov_c(rf?.[key]):""} unit=${unit}/></td><td><${Val} v=${lf?.[key]} cls=${isCov?cov_c(lf?.[key]):""} unit=${unit}/></td><td>${df!=null&&html`<${Bdg} txt=${(df>0?"+":"")+df+"%"} color=${def_c(df)}/>`}</td></tr>`;
        })}</tbody></table>
      <//>

      <div style=${{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <select value=${reportLang} onChange=${e=>setReportLang(e.target.value)} style=${{width:"auto",padding:"8px 12px"}}>
          <option value="el">🇬🇷 Ελληνικά</option>
          <option value="en">🇬🇧 English</option>
        </select>
        <${Btn} onClick=${()=>generateReport(athlete,meas,reportLang,measurements)} color=${"#1a7a4a"}>📄 Dark Report<//>
        <button onClick=${()=>window.print()} style=${{background:C.bg3,color:C.muted,padding:"9px 18px",border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer"}}>🖨 Εκτύπωση</button>
      </div>
    </div>`;
}

// ── COMPARE VIEW ──────────────────────────────────────────────────────────────
function CompareView({measurements}){
  const [t1id,setT1id]=useState(measurements[1]?.id||"");
  const [t2id,setT2id]=useState(measurements[0]?.id||"");
  if(measurements.length<2)return html`<${Card} style=${{textAlign:"center",padding:40,color:C.muted}}><div style=${{fontSize:32,marginBottom:12}}>📈</div><div>Χρειάζονται τουλάχιστον 2 μετρήσεις.</div><//>`;
  const t1=measurements.find(m=>m.id===t1id),t2=measurements.find(m=>m.id===t2id);
  const gv=(m,s,g,k)=>m?.test_results?.find(r=>r.side===s&&r.muscle_group===g)?.[k];
  const delta=(a,b)=>(a!=null&&b!=null)?Math.round(((b-a)/Math.abs(a))*100):null;
  const an1=analyze(t1?.test_results||[]),an2=analyze(t2?.test_results||[]);
  const prows=[["PT Εκτ. Δεξί (Nm)","right","extensors","peak_torque"],["PT Εκτ. Αριστ. (Nm)","left","extensors","peak_torque"],["PT Κάμπτ. Δεξί (Nm)","right","flexors","peak_torque"],["PT Κάμπτ. Αριστ. (Nm)","left","flexors","peak_torque"],["Work Εκτ. Δεξί (Nm)","right","extensors","work_per_rep"],["Work Κάμπτ. Δεξί (Nm)","right","flexors","work_per_rep"],["Power Εκτ. Δεξί (W)","right","extensors","avg_power"],["Power Κάμπτ. Δεξί (W)","right","flexors","avg_power"]];
  return html`
    <div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:16,marginBottom:20,alignItems:"end"}}>
        <div><${Lbl} t="ΜΕΤΡΗΣΗ 1 (Βάση)"/><select value=${t1id} onChange=${e=>setT1id(e.target.value)}>${measurements.map(m=>html`<option key=${m.id} value=${m.id}>${m.test_date} — ${m.notes||m.protocol}</option>`)}</select></div>
        <div style=${{textAlign:"center",color:C.border,fontSize:20,paddingBottom:8}}>→</div>
        <div><${Lbl} t="ΜΕΤΡΗΣΗ 2 (Νεότερη)"/><select value=${t2id} onChange=${e=>setT2id(e.target.value)}>${measurements.map(m=>html`<option key=${m.id} value=${m.id}>${m.test_date} — ${m.notes||m.protocol}</option>`)}</select></div>
      </div>
      ${t1&&t2&&t1.gravity_corrected!==t2.gravity_corrected&&html`<div style=${{background:"rgba(245,200,66,0.08)",border:`1px solid ${C.yellow}`,borderRadius:8,padding:"10px 16px",marginBottom:16,color:C.yellow,fontSize:12}}>⚠ Διαφορά gravity correction</div>`}
      <${Sec} t="Σύγκριση Παραμέτρων"/>
      <${Card} style=${{padding:0,marginBottom:20}}>
        <table><thead><tr><th>Παράμετρος</th><th>${t1?.test_date||"T1"}</th><th>${t2?.test_date||"T2"}</th><th>Μεταβολή</th></tr></thead>
        <tbody>${prows.map(([lbl,s,g,k])=>{const v1=gv(t1,s,g,k),v2=gv(t2,s,g,k),d=delta(v1,v2);return html`<tr key=${lbl}><td class="muted" style=${{fontSize:12}}>${lbl}</td><td class="mono">${v1??"—"}</td><td class="mono">${v2??"—"}</td><td>${d!=null&&html`<${Bdg} txt=${(d>0?"+":"")+d+"%"} color=${d>=0?"green":"red"}/>`}</td></tr>`;})}</tbody></table>
      <//>
      <${Sec} t="LSI & H/Q — Εξέλιξη"/>
      <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        ${[["LSI PT Εκτ.",an1.lsi_ext,an2.lsi_ext],["LSI PT Κάμπτ.",an1.lsi_flex,an2.lsi_flex],["H/Q Δεξί",an1.hq_r,an2.hq_r],["H/Q Αριστ.",an1.hq_l,an2.hq_l],["LSI Work",an1.lsi_work,an2.lsi_work],["LSI Power",an1.lsi_pwr,an2.lsi_pwr]].map(([lbl,v1,v2])=>{
          const d=delta(v1,v2);
          return html`<${Card} key=${lbl} style=${{textAlign:"center"}}>
            <div style=${{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>${lbl}</div>
            <div style=${{display:"flex",justifyContent:"center",gap:10,alignItems:"center"}}>
              <span class="mono muted" style=${{fontSize:14}}>${v1??"—"}%</span>
              <span style=${{color:C.border}}>→</span>
              <span class=${"mono "+lsi_c(v2)} style=${{fontSize:20,fontWeight:700}}>${v2??"—"}%</span>
            </div>
            ${d!=null&&html`<div style=${{marginTop:6}}><${Bdg} txt=${(d>0?"+":"")+d+"%"} color=${d>=0?"green":"red"}/></div>`}
          <//>`;
        })}
      </div>
    </div>`;
}


// ── MULTI-SPEED SESSION INPUT ─────────────────────────────────────────────────
function MultiSpeedInput({athlete, onSave, onCancel}) {
  const DEFAULT_SPEEDS = [60, 180];
  const [speeds, setSpeeds] = useState(DEFAULT_SPEEDS);
  const [newSpeed, setNewSpeed] = useState("");
  const [joint, setJoint] = useState("knee");
  const [protocol, setProtocol] = useState("con_con");
  const [testDate, setTestDate] = useState(new Date().toISOString().split("T")[0]);
  const [gravityCorr, setGravityCorr] = useState(true);
  const [notes, setNotes] = useState("");
  const [mode, setMode] = useState("upload"); // upload | manual
  const [uploads, setUploads] = useState({}); // {speed: parsedData}
  const [manualData, setManualData] = useState({}); // {speed: rows}
  const [parsing, setParsing] = useState(null); // speed being parsed
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  const addSpeed = () => {
    const s = parseInt(newSpeed);
    if(s && !speeds.includes(s)) { setSpeeds(p=>[...p,s].sort((a,b)=>a-b)); setNewSpeed(""); }
  };
  const removeSpeed = (s) => setSpeeds(p=>p.filter(x=>x!==s));

  const groups = joint==="shoulder" ? ["extensors","flexors","internal_rot","external_rot"] : ["extensors","flexors"];
  const emptyRows = () => ["right","left"].flatMap(s=>groups.map(g=>({side:s,muscle_group:g,peak_torque:"",pt_cov:"",pt_bw:"",work_per_rep:"",work_cov:"",work_bw:"",avg_power:"",power_cov:"",power_bw:"",joint_angle_peak:"",rom:"",rom_cov:"",time_to_peak:"",force_decay:""})));

  const handleFile = async(speed, e) => {
    const file = e.target.files[0]; if(!file) return;
    setParsing(speed); setError("");
    try {
      const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const data = await parsePDF(b64);
      setUploads(p=>({...p,[speed]:data}));
    } catch(err) { setError("Σφάλμα PDF "+speed+"°/s: "+err.message); }
    setParsing(null);
  };

  const getManualRows = (speed) => manualData[speed] || emptyRows();
  const setManualVal = (speed,i,k,v) => setManualData(p=>({...p,[speed]:getManualRows(speed).map((row,idx)=>idx===i?{...row,[k]:v}:row)}));
  const toN = v => v===""?null:+v;

  const saveSession = async() => {
    setSaving(true); setError("");
    try {
      // Generate a session_id shared across all speeds
      const sessionId = crypto.randomUUID();
      for(const speed of speeds) {
        const results = mode==="upload"
          ? (uploads[speed]?.results || [])
          : getManualRows(speed).map(row=>Object.fromEntries(Object.entries(row).map(([k,v])=>["side","muscle_group"].includes(k)?[k,v]:[k,toN(v)])));

        if(!results.length) continue;

        const meas = await db.post("measurements", {
          athlete_id: athlete.id,
          test_date: testDate,
          joint, protocol,
          speed_deg_s: speed,
          reps: mode==="upload"?(uploads[speed]?.reps||5):5,
          gravity_corrected: gravityCorr,
          source: mode==="upload"?"pdf_upload":"manual",
          notes: notes + (speeds.length>1?` [Session ${speeds.join("+")}°/s]`:""),
          session_id: sessionId,
          raw_json: mode==="upload"?(uploads[speed]||null):null,
        });
        if(!meas?.id) throw new Error("Σφάλμα αποθήκευσης "+speed+"°/s");
        for(const row of results) {
          const clean = {measurement_id:meas.id, speed_deg_s:speed};
          Object.entries(row).forEach(([k,v])=>{ if(KNOWN_COLS.has(k)&&v!=null) clean[k]=v; });
          await db.post("test_results", clean);
        }
      }
      onSave();
    } catch(err) { setError(err.message); }
    setSaving(false);
  };

  const allUploaded = speeds.every(s=>uploads[s]);
  const canSave = mode==="upload" ? allUploaded : true;

  return html\`
    <div>
      <div style=\${{marginBottom:20}}>
        <div style=\${{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Νέο Multi-Speed Session</div>
        <div style=\${{fontSize:22,fontWeight:700}}>\${athlete.name}</div>
      </div>

      <\${Card} style=\${{marginBottom:16}}>
        <\${Sec} t="Ρύθμιση Session"/>
        <div style=\${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
          <div><\${Lbl} t="Ημερομηνία"/><input type="date" value=\${testDate} onInput=\${e=>setTestDate(e.target.value)}/></div>
          <div><\${Lbl} t="Άρθρωση"/><select value=\${joint} onChange=\${e=>setJoint(e.target.value)}>\${["knee","shoulder","trunk","elbow","ankle"].map(j=>html\`<option value=\${j}>\${j}</option>\`)}</select></div>
          <div><\${Lbl} t="Πρωτόκολλο"/><select value=\${protocol} onChange=\${e=>setProtocol(e.target.value)}>\${["con_con","con_ecc","ecc_con","isometric","isotonic"].map(p=>html\`<option value=\${p}>\${p}</option>\`)}</select></div>
          <div style=\${{display:"flex",alignItems:"center",gap:8,paddingTop:20}}><input type="checkbox" checked=\${gravityCorr} onChange=\${e=>setGravityCorr(e.target.checked)} style=\${{width:"auto"}}/><span style=\${{fontSize:12,color:C.muted}}>Gravity Correction</span></div>
          <div style=\${{gridColumn:"2/-1"}}><\${Lbl} t="Σημειώσεις"/><input value=\${notes} onInput=\${e=>setNotes(e.target.value)} placeholder="π.χ. Post ACL-R"/></div>
        </div>
        <\${Sec} t="Ταχύτητες (°/s)"/>
        <div style=\${{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
          \${speeds.map(s=>html\`
            <div key=\${s} style=\${{display:"flex",alignItems:"center",gap:6,background:C.bg3,border:\`1px solid \${C.accent}\`,borderRadius:20,padding:"4px 12px"}}>
              <span style=\${{fontFamily:"monospace",fontWeight:600,color:C.accent}}>\${s}°/s</span>
              <button onClick=\${()=>removeSpeed(s)} style=\${{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>
            </div>
          \`)}
          <div style=\${{display:"flex",gap:6}}>
            <input type="number" value=\${newSpeed} onInput=\${e=>setNewSpeed(e.target.value)} placeholder="π.χ. 300" style=\${{width:90}} onKeyDown=\${e=>e.key==="Enter"&&addSpeed()}/>
            <button onClick=\${addSpeed} style=\${{padding:"6px 12px",background:C.bg3,color:C.accent,border:\`1px solid \${C.border}\`,borderRadius:6,cursor:"pointer"}}>+ Προσθήκη</button>
          </div>
        </div>
        <div style=\${{display:"flex",gap:8,marginTop:8}}>
          \${[[60],[180],[300],[60,180],[60,180,300]].map(preset=>html\`
            <button key=\${preset.join("+")} onClick=\${()=>setSpeeds(preset)} style=\${{padding:"4px 10px",background:C.bg3,color:C.muted,border:\`1px solid \${C.border}\`,borderRadius:4,cursor:"pointer",fontSize:11}}>\${preset.join("+")}°/s</button>
          \`)}
        </div>
      <//>

      <div style=\${{display:"flex",gap:8,marginBottom:20}}>
        \${["upload","manual"].map(m=>html\`<button key=\${m} onClick=\${()=>setMode(m)} style=\${{padding:"8px 18px",background:mode===m?C.accent:C.bg3,color:mode===m?"white":C.muted,border:\`1px solid \${mode===m?C.accent:C.border}\`,borderRadius:6,cursor:"pointer"}}>\${m==="upload"?"📄 Upload PDFs":"✏️ Χειροκίνητη"}</button>\`)}
      </div>

      \${speeds.map(speed=>html\`
        <\${Card} key=\${speed} style=\${{marginBottom:16,border:\`1px solid \${uploads[speed]?C.green:C.border}\`}}>
          <div style=\${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div style=\${{fontSize:14,fontWeight:700,color:C.accent,fontFamily:"monospace"}}>\${speed}°/s</div>
            \${uploads[speed]&&html\`<span style=\${{color:C.green,fontSize:12}}>✅ \${uploads[speed].results?.length} αποτελέσματα</span>\`}
          </div>
          \${mode==="upload"?html\`
            \${!uploads[speed]?html\`
              <label style=\${{display:"block",border:\`2px dashed \${C.border}\`,borderRadius:8,padding:20,textAlign:"center",cursor:"pointer",color:C.muted}}>
                \${parsing===speed?html\`<\${Sp}/><div style=\${{marginTop:6,fontSize:12}}>Ανάλυση AI...</div>\`:html\`<div style=\${{fontSize:24}}>📄</div><div style=\${{marginTop:4,fontSize:12}}>PDF \${speed}°/s</div>\`}
                <input type="file" accept=".pdf" onChange=\${e=>handleFile(speed,e)} style=\${{display:"none"}}/>
              </label>
            \`:html\`
              <div style=\${{fontSize:12,color:C.muted}}>
                \${uploads[speed].results?.slice(0,2).map((r,i)=>html\`
                  <div key=\${i} style=\${{display:"flex",gap:12,padding:"4px 0",borderBottom:\`1px solid \${C.border}\`}}>
                    <span style=\${{textTransform:"capitalize",width:100}}>\${r.muscle_group}</span>
                    <span>\${r.side==="right"?"Δεξί":"Αριστ."}</span>
                    <span class="mono \${r.pt_cov>0.25?"red":r.pt_cov>0.15?"yellow":"green"}">\${r.peak_torque} Nm</span>
                    <span class="muted">CoV: \${r.pt_cov}</span>
                  </div>
                \`)}
                \${uploads[speed].results?.length>2&&html\`<div style=\${{color:C.muted,fontSize:11,marginTop:4}}>+ \${uploads[speed].results.length-2} ακόμα...</div>\`}
                <button onClick=\${()=>setUploads(p=>({...p,[speed]:null}))} style=\${{marginTop:8,background:"none",color:C.red,border:"none",cursor:"pointer",fontSize:11}}>✕ Αφαίρεση</button>
              </div>
            \`}
          \`:html\`
            <div style=\${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              \${getManualRows(speed).filter((_,i)=>i<2).map((row,i)=>html\`
                <div key=\${i} style=\${{gridColumn:"1/-1",marginBottom:8}}>
                  <div style=\${{fontSize:11,fontWeight:600,color:C.accent,marginBottom:6,textTransform:"uppercase"}}>\${row.side==="right"?"🔴":"🔵"} \${row.muscle_group}</div>
                  <div style=\${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                    \${[["peak_torque","PT (Nm)"],["pt_cov","CoV"],["pt_bw","%BW"],["work_per_rep","Work"],["avg_power","Power"],["rom","ROM"],["joint_angle_peak","Angle"],["time_to_peak","T.Peak"]].map(([k,l])=>html\`
                      <div key=\${k}>
                        <div style=\${{fontSize:9,color:C.muted,marginBottom:2}}>\${l}</div>
                        <input type="number" step="0.01" value=\${row[k]} onInput=\${e=>setManualVal(speed,i,k,e.target.value)} placeholder="—" style=\${{fontSize:11,padding:"5px 6px"}}/>
                      </div>
                    \`)}
                  </div>
                </div>
              \`)}
            </div>
          \`}
        <//>
      \`)}

      \${error&&html\`<div style=\${{color:C.red,marginBottom:8,fontSize:12}}>\${error}</div>\`}

      \${mode==="upload"&&!allUploaded&&html\`
        <div style=\${{background:"rgba(245,200,66,0.08)",border:\`1px solid \${C.yellow}\`,borderRadius:8,padding:"10px 16px",marginBottom:16,color:C.yellow,fontSize:12}}>
          ⚠ Ανέβασε PDF για κάθε ταχύτητα: \${speeds.filter(s=>!uploads[s]).join(", ")}°/s
        </div>
      \`}

      <div style=\${{display:"flex",gap:10}}>
        <\${Btn} onClick=\${saveSession} disabled=\${saving||!canSave} color=\${C.green} textColor="#0d0f14">
          \${saving?html\`<\${Sp}/>\`:""}  Αποθήκευση Session (\${speeds.join("+")}°/s)
        <//>
        <\${Btn} onClick=\${onCancel} color=\${C.bg3} textColor=\${C.muted}>Ακύρωση<//>
      </div>
    </div>
  \`;
}

// ── MULTI-SPEED ANALYSIS VIEW ─────────────────────────────────────────────────
function MultiSpeedAnalysis({measurements, athlete}) {
  // Group by session_id or date+joint
  const sessions = {};
  measurements.forEach(m => {
    const key = m.session_id || (m.test_date + "_" + m.joint);
    if(!sessions[key]) sessions[key] = {date:m.test_date, joint:m.joint, measurements:[]};
    sessions[key].measurements.push(m);
  });

  const multiSessions = Object.values(sessions).filter(s=>s.measurements.length>1).sort((a,b)=>new Date(b.date)-new Date(a.date));

  if(!multiSessions.length) return html\`
    <\${Card} style=\${{textAlign:"center",padding:40,color:C.muted}}>
      <div style=\${{fontSize:32,marginBottom:12}}>⚡</div>
      <div>Δεν υπάρχουν multi-speed sessions ακόμα.</div>
      <div style=\${{fontSize:12,marginTop:8}}>Πρόσθεσε νέο session με 2+ ταχύτητες.</div>
    <//>
  \`;

  const [selSession, setSelSession] = useState(multiSessions[0]);

  const speeds = [...selSession.measurements].sort((a,b)=>a.speed_deg_s-b.speed_deg_s);
  const getVal = (m,side,grp,key) => m.test_results?.find(r=>r.side===side&&r.muscle_group===grp)?.[key];

  const params = [
    ["Peak Torque (Nm)","peak_torque"],
    ["%BW","pt_bw"],
    ["Work/Rep (Nm)","work_per_rep"],
    ["Avg Power (W)","avg_power"],
    ["H/Q (%)","__hq"],
    ["LSI Ext (%)","__lsi"],
  ];

  return html\`
    <div>
      \${multiSessions.length>1&&html\`
        <div style=\${{marginBottom:16}}>
          <\${Lbl} t="Επιλογή Session"/>
          <select value=\${selSession.date} onChange=\${e=>setSelSession(multiSessions.find(s=>s.date===e.target.value)||multiSessions[0])}>
            \${multiSessions.map(s=>html\`<option key=\${s.date} value=\${s.date}>\${s.date} — \${s.joint} [\${s.measurements.map(m=>m.speed_deg_s).sort((a,b)=>a-b).join("+")}°/s]</option>\`)}
          </select>
        </div>
      \`}

      <\${Sec} t=\${"Multi-Speed Session — " + selSession.date + " — " + speeds.map(m=>m.speed_deg_s).join("+") + "°/s"}/>

      \${/* Speed comparison table */\}
      <\${Card} style=\${{padding:0,marginBottom:20}}>
        <table>
          <thead>
            <tr>
              <th>Παράμετρος</th>
              \${speeds.map(m=>html\`<th key=\${m.speed_deg_s} colspan=2>\${m.speed_deg_s}°/s</th>\`)}
            </tr>
            <tr>
              <th></th>
              \${speeds.flatMap(m=>[
                html\`<th key=\${m.speed_deg_s+"R"} style=\${{fontSize:9}}>Δεξί Εκτ.</th>\`,
                html\`<th key=\${m.speed_deg_s+"L"} style=\${{fontSize:9}}>Αριστ. Εκτ.</th>\`,
              ])}
            </tr>
          </thead>
          <tbody>
            \${params.map(([lbl,key])=>html\`
              <tr key=\${key}>
                <td class="muted" style=\${{fontSize:12}}>\${lbl}</td>
                \${speeds.flatMap(m=>{
                  let vr,vl;
                  if(key==="__hq") {
                    const fr=getVal(m,"right","flexors","peak_torque"),er=getVal(m,"right","extensors","peak_torque");
                    const fl=getVal(m,"left","flexors","peak_torque"),el=getVal(m,"left","extensors","peak_torque");
                    vr=calcHQ(fr,er); vl=calcHQ(fl,el);
                  } else if(key==="__lsi") {
                    const r=getVal(m,"right","extensors","peak_torque"),l=getVal(m,"left","extensors","peak_torque");
                    vr=calcLSI(r,l); vl=null;
                  } else {
                    vr=getVal(m,"right","extensors",key);
                    vl=getVal(m,"left","extensors",key);
                  }
                  const cls = key==="__hq"?hq_c:key==="__lsi"?lsi_c:()=>"";
                  return [
                    html\`<td key=\${m.speed_deg_s+"r"} class=\${"mono "+cls(vr)}>\${vr!=null?vr+(key.includes("bw")||key.startsWith("__")?"%":""):"—"}</td>\`,
                    html\`<td key=\${m.speed_deg_s+"l"} class=\${"mono "+cls(vl)}>\${vl!=null?vl+(key.includes("bw")||key.startsWith("__")?"%":""):"—"}</td>\`,
                  ];
                })}
              </tr>
            \`)}
          </tbody>
        </table>
      <//>

      \${/* Individual speed analysis */\}
      <\${Sec} t="Ανάλυση ανά Ταχύτητα"/>
      <div style=\${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:16}}>
        \${speeds.map(m=>{
          const an=analyze(m.test_results||[],athlete?.gender||"");
          const {lsi_ext,hq_r,hq_l}=an;
          return html\`
            <\${Card} key=\${m.speed_deg_s}>
              <div style=\${{fontSize:14,fontWeight:700,color:C.accent,fontFamily:"monospace",marginBottom:12}}>\${m.speed_deg_s}°/s</div>
              <div style=\${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                \${[["LSI Εκτ.",lsi_ext,lsi_c(lsi_ext),"≥90%"],["H/Q Δεξί",hq_r,hq_c(hq_r),"55-65%"],["H/Q Αριστ.",hq_l,hq_c(hq_l),"55-65%"]].map(([lbl,val,cls,norm])=>html\`
                  <div key=\${lbl} style=\${{textAlign:"center",background:C.bg3,borderRadius:6,padding:"8px 4px"}}>
                    <div style=\${{fontSize:9,color:C.muted,marginBottom:3}}>\${lbl}</div>
                    <div class=\${"mono "+cls} style=\${{fontSize:18,fontWeight:700}}>\${val!=null?val+"%":"—"}</div>
                    <div style=\${{fontSize:8,color:C.muted}}>\${norm}</div>
                  </div>
                \`)}
              </div>
            <//>
          \`;
        })}
      </div>
    </div>
  \`;
}

// ── MEASUREMENT INPUT ─────────────────────────────────────────────────────────
function MeasurementInput({athlete,onSave,onCancel}){
  const [mode,setMode]=useState("upload");
  const [parsing,setParsing]=useState(false);
  const [parsed,setParsed]=useState(null);
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState("");
  const [meta,setMeta]=useState({test_date:new Date().toISOString().split("T")[0],joint:"knee",protocol:"con_con",speed_deg_s:60,reps:5,gravity_corrected:true,notes:""});
  const sm=(k,v)=>setMeta(p=>({...p,[k]:v}));
  const groups=meta.joint==="shoulder"?["extensors","flexors","internal_rot","external_rot"]:["extensors","flexors"];
  const emptyRow=(s,g)=>({side:s,muscle_group:g,peak_torque:"",pt_cov:"",pt_bw:"",work_per_rep:"",work_cov:"",work_bw:"",avg_power:"",power_cov:"",power_bw:"",joint_angle_peak:"",rom:"",rom_cov:"",time_to_peak:"",force_decay:""});
  const [rows,setRows]=useState(()=>["right","left"].flatMap(s=>groups.map(g=>emptyRow(s,g))));
  const setVal=(i,k,v)=>setRows(r=>r.map((row,idx)=>idx===i?{...row,[k]:v}:row));
  const toN=v=>v===""?null:+v;

  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setParsing(true);setError("");
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const data=await parsePDF(b64);
      setParsed(data);
      setMeta(m=>({...m,test_date:data.test_date||m.test_date,joint:data.joint||m.joint,protocol:data.protocol||m.protocol,speed_deg_s:data.speed_deg_s||m.speed_deg_s,reps:data.reps||m.reps}));
    }catch(err){setError("Σφάλμα: "+err.message);}
    setParsing(false);
  };

  const saveMeas=async(results)=>{
    setSaving(true);setError("");
    try{
      const meas=await db.post("measurements",{athlete_id:athlete.id,...meta,speed_deg_s:+meta.speed_deg_s,reps:+meta.reps,raw_json:parsed||null,source:mode==="upload"?"pdf_upload":"manual"});
      if(!meas?.id)throw new Error("Δεν επιστράφηκε ID");
      for(const row of results){
        const clean={measurement_id:meas.id};
        Object.entries(row).forEach(([k,v])=>{if(KNOWN_COLS.has(k)&&v!=null)clean[k]=v;});
        await db.post("test_results",clean);
      }
      onSave(meas);
    }catch(err){setError(err.message);}
    setSaving(false);
  };

  const submitManual=()=>saveMeas(rows.map(row=>Object.fromEntries(Object.entries(row).map(([k,v])=>["side","muscle_group"].includes(k)?[k,v]:[k,toN(v)]))));

  return html`
    <div>
      <div style=${{marginBottom:20}}><div style=${{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Νέα Μέτρηση</div><div style=${{fontSize:22,fontWeight:700}}>${athlete.name}</div></div>
      <div style=${{display:"flex",gap:8,marginBottom:20}}>
        ${["upload","manual"].map(m=>html`<button key=${m} onClick=${()=>setMode(m)} style=${{padding:"8px 18px",background:mode===m?C.accent:C.bg3,color:mode===m?"white":C.muted,border:`1px solid ${mode===m?C.accent:C.border}`,borderRadius:6,cursor:"pointer"}}>${m==="upload"?"📄 Upload PDF":"✏️ Χειροκίνητη"}</button>`)}
      </div>
      <${Card} style=${{marginBottom:16}}>
        <${Sec} t="Στοιχεία Μέτρησης"/>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
          <div><${Lbl} t="Ημερομηνία"/><input type="date" value=${meta.test_date} onInput=${e=>sm("test_date",e.target.value)}/></div>
          <div><${Lbl} t="Άρθρωση"/><select value=${meta.joint} onChange=${e=>sm("joint",e.target.value)}>${["knee","shoulder","trunk","elbow","ankle"].map(j=>html`<option value=${j}>${j}</option>`)}</select></div>
          <div><${Lbl} t="Πρωτόκολλο"/><select value=${meta.protocol} onChange=${e=>sm("protocol",e.target.value)}>${["con_con","con_ecc","ecc_con","isometric","isotonic"].map(p=>html`<option value=${p}>${p}</option>`)}</select></div>
          <div><${Lbl} t="Ταχύτητα (°/s)"/><input type="number" value=${meta.speed_deg_s} onInput=${e=>sm("speed_deg_s",e.target.value)}/></div>
          <div><${Lbl} t="Reps"/><input type="number" value=${meta.reps} onInput=${e=>sm("reps",e.target.value)}/></div>
          <div style=${{display:"flex",alignItems:"center",gap:8,paddingTop:20}}><input type="checkbox" checked=${meta.gravity_corrected} onChange=${e=>sm("gravity_corrected",e.target.checked)} style=${{width:"auto"}}/><span style=${{fontSize:12,color:C.muted}}>Gravity Correction</span></div>
          <div style=${{gridColumn:"1/-1"}}><${Lbl} t="Σημειώσεις"/><input value=${meta.notes} onInput=${e=>sm("notes",e.target.value)} placeholder="π.χ. Post ACL-R 6 μήνες"/></div>
        </div>
      <//>
      ${mode==="upload"?html`
        <${Card}>
          <${Sec} t="Upload PDF Cybex HUMAC"/>
          ${!parsed?html`
            <div>
              <label style=${{display:"block",border:`2px dashed ${C.border}`,borderRadius:8,padding:32,textAlign:"center",cursor:"pointer",color:C.muted}}>
                ${parsing?html`<${Sp}/><div style=${{marginTop:8}}>Ανάλυση με AI...</div>`:html`<div style=${{fontSize:36}}>📄</div><div style=${{marginTop:8}}>Κλικ για επιλογή PDF</div><div style=${{fontSize:11,marginTop:4}}>Cybex HUMAC NORM</div>`}
                <input type="file" accept=".pdf" onChange=${handleFile} style=${{display:"none"}}/>
              </label>
              ${error&&html`<div style=${{color:C.red,marginTop:8,fontSize:12}}>${error}</div>`}
            </div>
          `:html`
            <div>
              <div style=${{color:C.green,marginBottom:16,fontWeight:600}}>✅ PDF αναλύθηκε — ${parsed.results?.length} αποτελέσματα</div>
              <${Card} style=${{background:C.bg3,padding:0,marginBottom:16}}>
                <table><thead><tr><th>Ομάδα</th><th>Πλευρά</th><th>Peak Torque</th><th>CoV</th><th>%BW</th><th>Work</th><th>Power</th></tr></thead>
                <tbody>${parsed.results?.map((r,i)=>html`<tr key=${i}><td style=${{textTransform:"capitalize"}}>${r.muscle_group}</td><td class="muted">${r.side==="right"?"Δεξί":"Αριστ."}</td><td class=${"mono "+(r.pt_cov>0.25?"red":r.pt_cov>0.15?"yellow":"green")}>${r.peak_torque} Nm</td><td><${Bdg} txt=${r.pt_cov} color=${cov_c(r.pt_cov)}/></td><td class="mono muted">${r.pt_bw}%</td><td class="mono">${r.work_per_rep}</td><td class="mono">${r.avg_power}</td></tr>`)}</tbody></table>
              <//>
              ${error&&html`<div style=${{color:C.red,marginBottom:8,fontSize:12}}>${error}</div>`}
              <div style=${{display:"flex",gap:10}}>
                <${Btn} onClick=${()=>saveMeas(parsed.results)} disabled=${saving} color=${C.green} textColor="#0d0f14">${saving?html`<${Sp}/>`:""} Αποθήκευση<//>
                <${Btn} onClick=${()=>setParsed(null)} color=${C.bg3} textColor=${C.muted}>Νέο PDF<//>
                <${Btn} onClick=${onCancel} color=${C.bg3} textColor=${C.muted}>Ακύρωση<//>
              </div>
            </div>
          `}
        <//>
      `:html`
        <div>
          ${rows.map((row,i)=>html`
            <${Card} key=${i} style=${{marginBottom:12}}>
              <div style=${{fontSize:12,fontWeight:600,color:C.accent,marginBottom:12,textTransform:"uppercase"}}>${row.side==="right"?"🔴 Δεξί":"🔵 Αριστερό"} — ${row.muscle_group}</div>
              <div style=${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                ${[["peak_torque","Peak Torque (Nm)"],["pt_cov","CoV PT"],["pt_bw","%BW"],["work_per_rep","Work (Nm)"],["work_cov","CoV Work"],["avg_power","Power (W)"],["power_cov","CoV Power"],["joint_angle_peak","Angle (°)"],["rom","ROM (°)"],["rom_cov","CoV ROM"],["time_to_peak","Time Peak (s)"],["force_decay","Force Decay (s)"]].map(([k,l])=>html`<div key=${k}><${Lbl} t=${l}/><input type="number" step="0.01" value=${row[k]} onInput=${e=>setVal(i,k,e.target.value)} placeholder="—"/></div>`)}
              </div>
            <//>
          `)}
          ${error&&html`<div style=${{color:C.red,marginBottom:8,fontSize:12}}>${error}</div>`}
          <div style=${{display:"flex",gap:10}}>
            <${Btn} onClick=${submitManual} disabled=${saving} color=${C.green} textColor="#0d0f14">${saving?html`<${Sp}/>`:""} Αποθήκευση<//>
            <${Btn} onClick=${onCancel} color=${C.bg3} textColor=${C.muted}>Ακύρωση<//>
          </div>
        </div>
      `}
    </div>`;
}

          <${Btn} onClick=${onEdit} color=${C.bg3} textColor=${C.muted} style=${{fontSize:12}}>✏️ Επεξεργασία<//>
          <${Btn} onClick=${onNewMeasurement}>+ Νέα Μέτρηση<//>
          <${Btn} onClick=${onNewMultiSpeed} color=${"#1a5c3a"} style=${{fontSize:12}}>⚡ Multi-Speed<//>
        </div>
      </div>

      <div style=${{display:"flex",gap:4,marginBottom:20,borderBottom:`1px solid ${C.border}`}}>
        ${tabs.map(([v,l])=>html`<button key=${v} onClick=${()=>setTab(v)} style=${{padding:"8px 18px",background:"none",color:tab===v?C.accent:C.muted,borderBottom:tab===v?`2px solid ${C.accent}`:"2px solid transparent",border:"none",borderRadius:0,cursor:"pointer",fontWeight:tab===v?600:400}}>${l}</button>`)}
      </div>

      ${loading?html`<div style=${{textAlign:"center",padding:40}}><${Sp}/></div>`:html`
        ${tab==="history"&&html`
          <div>
            ${selected.length>0&&html`<div style=${{background:"rgba(79,142,247,0.08)",border:`1px solid ${C.accent}`,borderRadius:8,padding:"10px 16px",marginBottom:16,fontSize:12,color:C.accent}}>${selected.length===1?"1 μέτρηση επιλεγμένη — πάτα Ανάλυση":"2 μετρήσεις — πάτα Σύγκριση"}</div>`}
            ${measurements.length===0?html`<${Card} style=${{textAlign:"center",padding:40,color:C.muted}}><div style=${{fontSize:32,marginBottom:12}}>📊</div><div>Δεν υπάρχουν μετρήσεις.</div><//>`:html`
              <${Card} style=${{padding:0}}>
                <div style=${{overflowX:"auto"}}>
                  <table><thead><tr><th></th><th>Ημερομηνία</th><th>Άρθρωση</th><th>Πρωτόκολλο</th><th>°/s</th><th>Gravity</th><th>Πηγή</th><th>Σημειώσεις</th><th></th></tr></thead>
                  <tbody>${measurements.map(m=>html`
                    <tr key=${m.id}>
                      <td><input type="checkbox" checked=${selected.includes(m.id)} onChange=${()=>toggle(m.id)} style=${{width:"auto"}}/></td>
                      <td style=${{fontWeight:600}}>${m.test_date}</td>
                      <td style=${{textTransform:"capitalize"}}>${m.joint}</td>
                      <td><${Bdg} txt=${m.protocol} color="muted"/></td>
                      <td class="mono muted">${m.speed_deg_s}</td>
                      <td>${m.gravity_corrected?html`<span class="green">✓</span>`:html`<span class="red">✗</span>`}</td>
                      <td class="muted" style=${{fontSize:11}}>${m.source==="pdf_upload"?"PDF":"Manual"}</td>
                      <td class="muted" style=${{fontSize:11}}>${m.notes||"—"}</td>
                      <td style=${{whiteSpace:"nowrap"}}>
                        <button onClick=${()=>{setSelected([m.id]);setTab("analysis");}} style=${{background:C.bg3,color:C.accent,padding:"4px 10px",fontSize:11,border:"none",borderRadius:4,cursor:"pointer",marginRight:4}}>Ανάλυση</button>
                        <button onClick=${()=>deleteMeas(m)} disabled=${deleting===m.id} style=${{background:"rgba(242,95,92,0.1)",color:C.red,padding:"4px 10px",fontSize:11,border:"none",borderRadius:4,cursor:"pointer"}}>${deleting===m.id?html`<${Sp}/>`:""} 🗑</button>
                      </td>
                    </tr>
                  `)}</tbody></table>
                </div>
              <//>
            `}
          </div>
        `}
        ${tab==="analysis"&&html`<${AnalysisView} measurements=${measurements} selected=${selected} athlete=${athlete}/>`}
        ${tab==="trends"&&html`<${TrendCharts} measurements=${measurements}/>`}
        ${tab==="compare"&&html`<${CompareView} measurements=${measurements}/>`}
        ${tab==="multispeed"&&html`<${MultiSpeedAnalysis} measurements=${measurements} athlete=${athlete}/>`}
      `}
    </div>`;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("list");
  const [athlete,setAthlete]=useState(null);
  const [toast,setToast]=useState(null);
  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  return html`
    <div style=${{minHeight:"100vh",background:C.bg}}>
      <div style=${{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:"14px 32px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style=${{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick=${()=>setView("list")}>
          <div style=${{width:36,height:36,background:C.accent,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚡</div>
          <div><div style=${{fontWeight:700,fontSize:15}}>360 Ergometric Tests</div><div style=${{fontSize:11,color:C.muted}}>Isokinetic Assessment Platform</div></div>
        </div>
        ${athlete&&view!=="list"&&view!=="new"&&html`<div style=${{fontSize:12,color:C.muted}}><span style=${{cursor:"pointer",color:C.accent}} onClick=${()=>setView("list")}>Αθλητές</span>${" › "}<span style=${{color:C.text}}>${athlete.name}</span></div>`}
      </div>
      <div style=${{maxWidth:1150,margin:"0 auto",padding:"28px 32px"}}>
        ${view==="list"&&html`<${AthleteList} onSelect=${a=>{setAthlete(a);setView("profile");}} onNew=${()=>setView("new")}/>`}
        ${view==="new"&&html`<${AthleteForm} onSave=${a=>{setAthlete(a);showToast("Αθλητής αποθηκεύτηκε");setView("profile");}} onCancel=${()=>setView("list")}/>`}
        ${view==="edit"&&athlete&&html`<${AthleteForm} athlete=${athlete} onSave=${a=>{setAthlete(a);showToast("Στοιχεία ενημερώθηκαν");setView("profile");}} onCancel=${()=>setView("profile")}/>`}
        ${view==="profile"&&athlete&&html`<${AthleteProfile} athlete=${athlete} onBack=${()=>setView("list")} onNewMeasurement=${()=>setView("meas")} onNewMultiSpeed=${()=>setView("multispeed")} onEdit=${()=>setView("edit")} showToast=${showToast}/>`}
        ${view==="meas"&&athlete&&html`<${MeasurementInput} athlete=${athlete} onSave=${()=>{showToast("Μέτρηση αποθηκεύτηκε");setView("profile");}} onCancel=${()=>setView("profile")}/>`}
        ${view==="multispeed"&&athlete&&html`<${MultiSpeedInput} athlete=${athlete} onSave=${()=>{showToast("Session αποθηκεύτηκε ✅");setView("profile");}} onCancel=${()=>setView("profile")}/>`}
      </div>
      <${Toast} msg=${toast?.msg} type=${toast?.type}/>
    </div>`;
}

render(h(App,null),document.getElementById("root"));
  </script>
  <style>

    input,select,textarea{background:#1a1e28;border:1px solid #252a38;color:#e8eaf0;border-radius:6px;padding:8px 12px;font-size:13px;font-family:Inter,sans-serif;width:100%;outline:none;box-sizing:border-box}
    input:focus,select:focus,textarea:focus{border-color:#4f8ef7}
    table{width:100%;border-collapse:collapse}
    th{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#6b7390;padding:7px 10px;text-align:left;border-bottom:1px solid #252a38}
    td{padding:8px 10px;font-size:13px;border-bottom:1px solid rgba(37,42,56,0.5)}
    tr:last-child td{border-bottom:none}

    .green{color:#3ecf8e}.yellow{color:#f5c842}.red{color:#f25f5c}.muted{color:#6b7390}.accent{color:#4f8ef7}

    @media print{body{background:white;color:black}}

</head>
