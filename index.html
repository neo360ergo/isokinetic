const H = {"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Prefer":"return=representation"};
const db = {
  async get(table, filter={}, extra="") {
    let url = `${SB_URL}/rest/v1/${table}?select=*${extra}`;
    Object.entries(filter).forEach(([k,v])=>url+=`&${k}=eq.${v}`);
    const r = await fetch(url, {headers:H});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, body) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {method:"POST",headers:H,body:JSON.stringify(body)});
    if(!r.ok) throw new Error(await r.text());
    const d = await r.json();
    return Array.isArray(d)?d[0]:d;
  },
  async patch(table, id, body) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {method:"PATCH",headers:H,body:JSON.stringify(body)});
    if(!r.ok) throw new Error(await r.text());
    const d = await r.json();
    return Array.isArray(d)?d[0]:d;
  }
};

// ‚îÄ‚îÄ PDF PARSER ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
async function parsePDF(base64) {
  const prompt=`Extract ALL isokinetic data from this Cybex HUMAC NORM PDF. Return ONLY valid JSON, no markdown, no explanation.
Schema: {"athlete_name":"","test_date":"YYYY-MM-DD","joint":"knee","protocol":"con_con","speed_deg_s":60,"reps":5,"gravity_corrected":true,"results":[{"side":"right","muscle_group":"extensors","peak_torque":0,"pt_cov":0,"pt_bw":0,"work_per_rep":0,"work_cov":0,"work_bw":0,"avg_power":0,"power_cov":0,"power_bw":0,"joint_angle_peak":0,"joint_angle_cov":0,"rom":0,"rom_cov":0,"time_to_peak":0,"time_to_peak_cov":0,"time_peak_held":0,"force_decay":0,"reciprocal_delay":0,"delay_time":0}]}`;
  const resp = await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
  const data = await resp.json();
  const text = data.content?.find(b=>b.type==="text")?.text||"";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}
