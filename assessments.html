function parseNum(v){if(v===undefined||v===null||v==="")return null;const n=parseFloat(String(v).replace(",","."));return isNaN(n)?null:n;}

function parseFileData(data) {
  return data.map(row=>{
    const mapped={};
    Object.entries(row).forEach(([col,val])=>{
      const key = COLUMN_MAP[col.trim()];
      if(key) mapped[key] = val;
    });
    // Categorize
    const anthropometry={}, fitness={}, energy={};
    Object.entries(mapped).forEach(([k,v])=>{
      const num = parseNum(v);
      if(PARAM_CATEGORY.anthropometry.includes(k)) anthropometry[k]=num;
      else if(PARAM_CATEGORY.fitness.includes(k)) fitness[k]=num;
      else if(PARAM_CATEGORY.energy.includes(k)) energy[k]=num;
    });
    return {
      id_number: String(mapped.id_number||"").trim(),
      first_name: String(mapped.first_name||"").trim(),
      last_name: String(mapped.last_name||"").trim(),
      dob: mapped.dob||null,
      phone: String(mapped.phone||"").trim(),
      test_date: mapped.test_date||null,
      notes: String(mapped.notes||"").trim(),
      anthropometry, fitness, energy,
      raw: mapped
    };
  }).filter(r=>r.first_name||r.last_name||r.id_number);
}

// ── NORMATIVE LOOKUP ──────────────────────────────────────────────────────────
function getScore(normatives, parameter, value, sport, gender, age) {
  if(value===null||value===undefined) return null;
  const v = parseFloat(value);
  if(isNaN(v)) return null;

  // Priority 1: exact sport + gender + age match
  // Priority 2: any sport (null/empty) + gender + age
  // Priority 3: any sport + any gender + age
  const ageMatch = n => (!n.age_min||age>=n.age_min) && (!n.age_max||age<=n.age_max);
  const valMatch = n => v>=parseFloat(n.value_from) && v<=parseFloat(n.value_to);
  const paramMatch = n => n.parameter?.toLowerCase()===parameter?.toLowerCase();

  const sportL = sport?.toLowerCase();
  const genderL = gender?.toLowerCase();

  // Try specific first
  const tries = [
    // sport + gender
    n => paramMatch(n) && n.sport?.toLowerCase()===sportL && n.gender?.toLowerCase()===genderL && ageMatch(n) && valMatch(n),
    // any sport + gender
    n => paramMatch(n) && (!n.sport||["all","any",""].includes(n.sport.toLowerCase())) && n.gender?.toLowerCase()===genderL && ageMatch(n) && valMatch(n),
    // sport + any gender
    n => paramMatch(n) && n.sport?.toLowerCase()===sportL && (!n.gender||["all","any",""].includes(n.gender.toLowerCase())) && ageMatch(n) && valMatch(n),
    // any sport + any gender
    n => paramMatch(n) && (!n.sport||["all","any",""].includes(n.sport.toLowerCase())) && (!n.gender||["all","any",""].includes(n.gender.toLowerCase())) && ageMatch(n) && valMatch(n),
  ];

  for(const tryFn of tries) {
    const match = normatives.find(tryFn);
    if(match) return match.score;
  }
  return null;
}

// ── NORMATIVE EXCEL HELPERS ───────────────────────────────────────────────────
function normToExcelRows(records) {
  return records.map(n=>({
    "Value From":        n.value_from!=null?n.value_from:"",
    "Value To":          n.value_to!=null?n.value_to:"",
    "Age From":          n.age_min!=null?n.age_min:"",
    "Age To":            n.age_max!=null?n.age_max:"",
    "Gender":            n.gender||"",
    "Sport":             n.sport||"",
    "Description EL":   n.description_el||"",
    "Description EN":   n.description_en||"",
    "Score":             n.score!=null?n.score:"",
    "Unit":              n.unit||"",
    "Higher Is Better":  n.higher_is_better!==false?"YES":"NO",
    "Source":            n.source||"international",
    "_id":               n.id||""
  }));
}

function excelRowsToNorms(rows, parameter, category) {
  return rows
    .filter(r => r['Value From']!==undefined && String(r['Value From']).trim()!=="" && r['Score']!==undefined)
    .map(r=>({
      id:             r['_id']||null,
      parameter,
      category,
      sport:          String(r.Sport||"").trim()||null,
      gender:         String(r.Gender||"").trim()||null,
      age_min:        parseNum(r['Age From']),
      age_max:        parseNum(r['Age To']),
      value_from:     parseNum(r['Value From']),
      value_to:       parseNum(r['Value To']),
      score:          parseInt(r.Score)||null,
      description_el: String(r['Description EL']||"").trim(),
      description_en: String(r['Description EN']||"").trim(),
      unit:           String(r.Unit||"").trim(),
      higher_is_better: String(r['Higher Is Better']||"YES").toUpperCase()!=="NO",
      source:         String(r.Source||"international").trim()
    }));
}

function downloadParamExcel(parameter, records) {
  const rows = normToExcelRows(records);
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [
    {wch:12},{wch:12},{wch:10},{wch:10},{wch:8},{wch:14},
    {wch:24},{wch:24},{wch:7},{wch:8},{wch:16},{wch:14},{wch:0,hidden:true}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, parameter.slice(0,31));
  XLSX.writeFile(wb, `normative_${parameter.replace(/[^a-zA-Z0-9]/g,'_')}.xlsx`);
}

// ── NORMATIVE MANAGER ─────────────────────────────────────────────────────────
function NormativeManager({showToast}) {
  const [norms, setNorms]           = useState([]);
  const [loading, setLoading]       = useState(true);
  const [editRow, setEditRow]       = useState(null);
  const [filters, setFilters]       = useState({parameter:"",sport:"",gender:"",source:""});
  const [page, setPage]             = useState(0);
  // Per-parameter view
  const [selParam, setSelParam]     = useState(null);
  const [paramNorms, setParamNorms] = useState([]);
  const [paramLoading, setParamLoading] = useState(false);
  const [importing, setImporting]   = useState(false);
  // New parameter form
  const [showNewParam, setShowNewParam] = useState(false);
  const [newParamName, setNewParamName] = useState("");
  const [newParamCat,  setNewParamCat]  = useState("fitness");
  const PAGE_SIZE = 30;

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      let extra = "&order=parameter.asc,sport.asc,gender.asc,age_min.asc,value_from.asc";
      if(filters.parameter) extra+=`&parameter=ilike.*${filters.parameter}*`;
      if(filters.sport)     extra+=`&sport=eq.${filters.sport}`;
      if(filters.gender)    extra+=`&gender=eq.${filters.gender}`;
      if(filters.source)    extra+=`&source=eq.${filters.source}`;
      const d = await db.get("normative_data", extra);
      setNorms(d||[]);
    } catch(e){showToast(e.message,"error");}
    setLoading(false);
  },[filters]);

  useEffect(()=>{load();setPage(0);},[load]);

  // ── Load records for a specific parameter
  const openParam = useCallback(async(param)=>{
    setSelParam(param);
    setParamLoading(true);
    try {
      const d = await db.get("normative_data",
        `&parameter=eq.${encodeURIComponent(param)}&order=sport.asc,gender.asc,age_min.asc,value_from.asc`);
      setParamNorms(d||[]);
    } catch(e){showToast(e.message,"error");}
    setParamLoading(false);
  },[]);

  // ── Export parameter to Excel
  const exportParam = (param) => {
    const records = norms.filter(n=>n.parameter===param);
    if(!records.length){ showToast("Δεν υπάρχουν εγγραφές για αυτή την παράμετρο","error"); return; }
    downloadParamExcel(param, records);
    showToast(`📥 Εξήχθη: normative_${param}.xlsx`);
  };

  // ── Import Excel for a parameter (replace all records for that param)
  const importParamExcel = async(e, param, category) => {
    const f = e.target.files[0]; if(!f) return;
    e.target.value="";
    if(!confirm(`Αυτό θα ΑΝΤΙΚΑΤΑΣΤΗΣΕΙ όλες τις εγγραφές για "${param}". Συνέχεια;`)) return;
    setImporting(param);
    try {
      const buf = await f.arrayBuffer();
      const wb = XLSX.read(buf, {cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
      const newRecords = excelRowsToNorms(rows, param, category);
      if(!newRecords.length) throw new Error("Δεν βρέθηκαν έγκυρες γραμμές στο αρχείο.");

      // Delete existing records for this parameter
      await fetch(`${SB_URL}/rest/v1/normative_data?parameter=eq.${encodeURIComponent(param)}`,{
        method:"DELETE", headers:{...dbH(), Prefer:""}
      });

      // Insert new records in batches of 50
      let inserted=0;
      for(let i=0;i<newRecords.length;i+=50){
        const batch = newRecords.slice(i,i+50).map(r=>{
          const {id,...rest}=r; return rest; // strip id for fresh insert
        });
        const res = await fetch(`${SB_URL}/rest/v1/normative_data`,{
          method:"POST", headers:{...dbH(),Prefer:"return=minimal"},
          body:JSON.stringify(batch)
        });
        if(!res.ok) throw new Error(await res.text());
        inserted+=batch.length;
      }
      showToast(`✅ ${inserted} εγγραφές εισήχθησαν για "${param}"`);
      load();
      if(selParam===param) openParam(param);
    } catch(err){ showToast("Σφάλμα: "+err.message,"error"); }

  };

  const createNewParam = async() => {

    XLSX.utils.book_append_sheet(wb, ws, p.slice(0,31));

      await db.del("normative_data",id);

      setParamNorms(n=>n.filter(x=>x.id!==id));

        setParamNorms(n=>n.map(x=>x.id===editRow.id?editRow:x));

// ── ASSESSMENT UPLOAD ─────────────────────────────────────────────────────────
function AssessmentUpload({showToast}) {
  const [file, setFile] = useState(null);
  const [parsed, setParsed] = useState([]);
  const [parsing, setParsing] = useState(false);
  const [saving, setSaving] = useState(false);
  const [teams, setTeams] = useState([]);
  const [sports, setSports] = useState([]);
  const [meta, setMeta] = useState({test_name:"",test_date:new Date().toISOString().split("T")[0],team_id:"",sport_id:"",examiner:"",notes:""});
  const sm=(k,v)=>setMeta(p=>({...p,[k]:v}));

  useEffect(()=>{
    db.get("teams","&order=name.asc").then(d=>setTeams(d||[]));
    db.get("sports","&order=name.asc").then(d=>setSports(d||[]));
  },[]);

  const handleFile = async(e) => {
    const f = e.target.files[0]; if(!f) return;
    setFile(f); setParsing(true);
    try {
      let rows=[];
      if(f.name.endsWith('.csv')) {
        const text = await f.text();
        const lines = text.trim().split("\n");
        // Find header row — first row that contains a known column name
        let headerIdx = 0;
        for(let i=0;i<Math.min(5,lines.length);i++){
          if(Object.keys(COLUMN_MAP).some(k=>lines[i].includes(k))){ headerIdx=i; break; }
        }
        const headers = lines[headerIdx].split(",").map(h=>h.replace(/"/g,"").trim());
        rows = lines.slice(headerIdx+1).map(line=>{
          const vals = [];
          let inQ=false, cur="";
          for(const ch of line+","){
            if(ch==='"'){inQ=!inQ;}
            else if(ch===","&&!inQ){vals.push(cur.trim());cur="";}
            else cur+=ch;
          }
          const obj={};
          headers.forEach((h,i)=>obj[h]=(vals[i]||"").replace(/^"|"$/g,"").trim());
          return obj;
        });
      } else {
        const buf = await f.arrayBuffer();
        const wb = XLSX.read(buf, {cellDates:true, dateNF:'yyyy-mm-dd'});
        const ws = wb.Sheets[wb.SheetNames[0]];

        // Find header row — scan first 5 rows for known column names
        const range = XLSX.utils.decode_range(ws['!ref']||'A1:A1');
        let headerRow = range.s.r;
        for(let r=range.s.r; r<=Math.min(range.s.r+4, range.e.r); r++){
          const rowVals = [];
          for(let c=range.s.c; c<=range.e.c; c++){
            const cell = ws[XLSX.utils.encode_cell({r,c})];
            if(cell) rowVals.push(String(cell.v||"").trim());
          }
          if(Object.keys(COLUMN_MAP).some(k=>rowVals.includes(k))){ headerRow=r; break; }
        }

        // Extract headers from found row
        const headers = [];
        for(let c=range.s.c; c<=range.e.c; c++){
          const cell = ws[XLSX.utils.encode_cell({r:headerRow, c})];
          headers.push(cell ? String(cell.v||"").trim() : "");
        }

        // Extract data rows
        for(let r=headerRow+1; r<=range.e.r; r++){
          const obj={};
          let hasData=false;
          for(let c=range.s.c; c<=range.e.c; c++){
            const cell = ws[XLSX.utils.encode_cell({r,c})];
            const h = headers[c-range.s.c];
            if(!h) continue;
            let val="";
            if(cell){
              if(cell.t==='d' || (cell.t==='n' && cell.z && cell.z.toLowerCase().includes('yy'))){
                // Date cell — format as ISO
                const d = cell.t==='d' ? cell.v : XLSX.SSF.parse_date_code(cell.v);
                if(cell.t==='d'){
                  const dt = cell.v instanceof Date ? cell.v : new Date(cell.v);
                  val = dt.toISOString().split('T')[0];
                } else {
                  val = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
                }
              } else if(cell.t==='n'){
                val = String(cell.v);
              } else {
                val = String(cell.v||"").trim();
              }
              if(val && val!=="0") hasData=true;
            }
            obj[h]=val;
          }
          if(hasData) rows.push(obj);
        }
      }
      // Filter truly empty rows (all values empty or whitespace)
      const clean = rows.filter(r=>Object.values(r).some(v=>String(v||"").trim()!==""));
      const data = parseFileData(clean);
      if(!data.length) throw new Error("Δεν βρέθηκαν έγκυρες εγγραφές. Έλεγξε ότι οι επικεφαλίδες ταιριάζουν με το format.");
      setParsed(data);
      if(data[0]?.test_date) sm("test_date", data[0].test_date);
      showToast(`✅ ${data.length} αθλητές διαβάστηκαν από ${f.name}`);
    } catch(err){ showToast("Σφάλμα: "+err.message,"error"); }
    setParsing(false);
  };

  const saveAssessment = async() => {
    if(!parsed.length) return;
    setSaving(true);
    try {
      // Create assessment session
      const assessment = await db.post("assessments",{
        test_name: meta.test_name||file?.name,
        test_date: meta.test_date,
        team_id: meta.team_id||null,
        sport_id: meta.sport_id||null,
        examiner: meta.examiner,
        notes: meta.notes
      });

      let saved=0, errors=0;
      for(const row of parsed) {
        try {
          // Find athlete by ID number or name
          let athlete = null;
          if(row.id_number) {
            const found = await db.get("athletes",`&id_number=eq.${encodeURIComponent(row.id_number)}`);
            athlete = found?.[0]||null;
          }
          if(!athlete && (row.first_name||row.last_name)) {
            const name = `${row.last_name} ${row.first_name}`.trim();
            const found = await db.get("athletes",`&name=ilike.*${encodeURIComponent(name)}*`);
            athlete = found?.[0]||null;
          }
          // Save result
          await db.post("assessment_results",{
            assessment_id: assessment.id,
            athlete_id: athlete?.id||null,
            anthropometry: row.anthropometry,
            fitness: row.fitness,
            energy: row.energy,
            raw_data: {
              id_number:row.id_number,
              first_name:row.first_name,
              last_name:row.last_name,
              dob:row.dob,
              notes:row.notes
            }
          });
          saved++;
        } catch(e){ errors++; }
      }
      showToast(`✅ ${saved} αθλητές αποθηκεύτηκαν${errors?` (${errors} σφάλματα)`:""}`);
      setParsed([]); setFile(null);
    } catch(err){ showToast(err.message,"error"); }
    setSaving(false);
  };

  return html`
    <div>
      <div style=${{marginBottom:20}}>
        <div style=${{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Νέο</div>
        <div style=${{fontSize:22,fontWeight:700}}>Upload Assessment</div>
      </div>

      <${Card} style=${{marginBottom:16}}>
        <${Sec} t="Στοιχεία Session"/>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
          <div style=${{gridColumn:"1/-1"}}><${Lbl} t="Τίτλος Assessment"/><input value=${meta.test_name} onInput=${e=>sm("test_name",e.target.value)} placeholder="π.χ. Easter Camp 2026 — AEL"/></div>
          <div><${Lbl} t="Ημερομηνία"/><input type="date" value=${meta.test_date} onInput=${e=>sm("test_date",e.target.value)}/></div>
          <div><${Lbl} t="Ομάδα"/><select value=${meta.team_id} onChange=${e=>sm("team_id",e.target.value)}><option value="">— Επιλογή —</option>${teams.map(t=>html`<option key=${t.id} value=${t.id}>${t.name}</option>`)}</select></div>
          <div><${Lbl} t="Άθλημα"/><select value=${meta.sport_id} onChange=${e=>sm("sport_id",e.target.value)}><option value="">— Επιλογή —</option>${sports.map(s=>html`<option key=${s.id} value=${s.id}>${s.name}</option>`)}</select></div>
          <div><${Lbl} t="Εξεταστής"/><input value=${meta.examiner} onInput=${e=>sm("examiner",e.target.value)} placeholder="Όνομα εξεταστή"/></div>
          <div style=${{gridColumn:"2/-1"}}><${Lbl} t="Σημειώσεις"/><input value=${meta.notes} onInput=${e=>sm("notes",e.target.value)}/></div>
        </div>
      <//>

      <${Card} style=${{marginBottom:16}}>
        <${Sec} t="Upload CSV / Excel"/>
        ${!parsed.length?html`
          <label style=${{display:"block",border:`2px dashed ${C.border}`,borderRadius:8,padding:32,textAlign:"center",cursor:"pointer",color:C.muted}}>
            ${parsing?html`<${Sp}/><div style=${{marginTop:8}}>Ανάλυση αρχείου...</div>`:html`
              <div style=${{fontSize:36}}>📊</div>
              <div style=${{marginTop:8,fontWeight:600}}>Κλικ για επιλογή αρχείου</div>
              <div style=${{fontSize:11,marginTop:4}}>CSV ή Excel (.xlsx) — Format: Team_0_Ergometric_Results</div>
            `}
            <input type="file" accept=".csv,.xlsx,.xls" onChange=${handleFile} style=${{display:"none"}}/>
          </label>
        `:html`
          <div>
            <div style=${{color:C.green,fontWeight:600,marginBottom:12}}>✅ ${parsed.length} αθλητές αναλύθηκαν από ${file?.name}</div>
            <div style=${{overflowX:"auto",marginBottom:16}}>
              <table><thead><tr><th>#</th><th>Όνομα</th><th>ID</th><th>Ημ. Γέννησης</th><th>Ανθρωπομετρία</th><th>Φυσικές</th><th>Ενεργειακά</th></tr></thead>
              <tbody>${parsed.map((r,i)=>html`
                <tr key=${i}>
                  <td class="muted">${i+1}</td>
                  <td style=${{fontWeight:600}}>${r.last_name} ${r.first_name}</td>
                  <td class="muted mono" style=${{fontSize:11}}>${r.id_number||"—"}</td>
                  <td class="muted" style=${{fontSize:11}}>${r.dob||"—"}</td>
                  <td><span style=${{fontSize:10,color:C.muted}}>${Object.keys(r.anthropometry).filter(k=>r.anthropometry[k]!==null).length} πεδία</span></td>
                  <td><span style=${{fontSize:10,color:C.muted}}>${Object.keys(r.fitness).filter(k=>r.fitness[k]!==null).length} πεδία</span></td>
                  <td><span style=${{fontSize:10,color:C.muted}}>${Object.keys(r.energy).filter(k=>r.energy[k]!==null).length} πεδία</span></td>
                </tr>
              `)}</tbody></table>
            </div>
            <div style=${{display:"flex",gap:10}}>
              <${Btn} onClick=${saveAssessment} disabled=${saving} color=${C.green} textColor="#0d0f14">${saving?html`<${Sp}/>`:"💾"} Αποθήκευση Assessment<//>
              <${Btn} onClick=${()=>{setParsed([]);setFile(null);}} color=${C.bg3} textColor=${C.muted}>✕ Νέο Αρχείο<//>
            </div>
          </div>
        `}
      <//>
    </div>`;
}
