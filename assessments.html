const db = {
  async get(table,extra=""){const r=await fetch(`${SB_URL}/rest/v1/${table}?select=*${extra}`,{headers:dbH()});if(!r.ok)throw new Error(await r.text());return r.json();},
  async post(table,body){const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:"POST",headers:dbH(),body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());const d=await r.json();return Array.isArray(d)?d[0]:d;},

function Sp(){return html`<span style="display:inline-block;width:16px;height:16px;border:2px solid #252a38;border-top:2px solid #4f8ef7;border-radius:50%;animation:spin 0.7s linear infinite"/>`;}
function Card({children,style={}}){return html`<div style=${{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 20px",...style}}>${children}</div>`;}
function Sec({t}){return html`<div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}><div style=${{width:3,height:14,background:C.accent,borderRadius:2}}/><span style=${{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted}}>${t}</span></div>`;}
function Lbl({t}){return html`<div style=${{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>${t}</div>`;}
function Btn({onClick,color=C.accent,textColor="white",children,disabled=false,style={}}){return html`<button onClick=${onClick} disabled=${disabled} style=${{background:color,color:textColor,padding:"9px 18px",border:"none",borderRadius:6,cursor:"pointer",fontWeight:500,opacity:disabled?0.6:1,...style}}>${children}</button>`;}
function Toast({msg,type}){if(!msg)return null;const c=type==="error"?C.red:C.green;return html`<div style=${{position:"fixed",bottom:24,right:24,background:type==="error"?"rgba(242,95,92,0.15)":"rgba(62,207,142,0.15)",border:`1px solid ${c}`,borderRadius:8,padding:"12px 20px",color:c,fontWeight:500,zIndex:9999}}>${msg}</div>`;}
function Bdg({txt,color="muted"}){
  const bg={green:"rgba(62,207,142,0.12)",yellow:"rgba(245,200,66,0.12)",red:"rgba(242,95,92,0.12)",muted:"rgba(107,115,144,0.12)"};
  const cc={green:C.green,yellow:C.yellow,red:C.red,muted:C.muted};
  return html`<span style=${{background:bg[color]||bg.muted,color:cc[color]||cc.muted,padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600}}>${txt}</span>`;
}

};

function parseNum(v){if(v===undefined||v===null||v==="")return null;const n=parseFloat(String(v).replace(",","."));return isNaN(n)?null:n;}

function parseFileData(data) {
  return data.map(row=>{
    const mapped={};
    Object.entries(row).forEach(([col,val])=>{
      const key = COLUMN_MAP[col.trim()];
      if(key) mapped[key] = val;
    });
    // Categorize
    const anthropometry={}, fitness={}, energy={};
    Object.entries(mapped).forEach(([k,v])=>{
      const num = parseNum(v);
      if(PARAM_CATEGORY.anthropometry.includes(k)) anthropometry[k]=num;
      else if(PARAM_CATEGORY.fitness.includes(k)) fitness[k]=num;
      else if(PARAM_CATEGORY.energy.includes(k)) energy[k]=num;
    });
    return {
      id_number: String(mapped.id_number||"").trim(),
      first_name: String(mapped.first_name||"").trim(),
      last_name: String(mapped.last_name||"").trim(),
      dob: mapped.dob||null,
      phone: String(mapped.phone||"").trim(),
      test_date: mapped.test_date||null,
      notes: String(mapped.notes||"").trim(),
      anthropometry, fitness, energy,
      raw: mapped
    };
  }).filter(r=>r.first_name||r.last_name||r.id_number);
}

// ── NORMATIVE LOOKUP ──────────────────────────────────────────────────────────
function getScore(normatives, parameter, value, sport, gender, age) {
  if(value===null||value===undefined) return null;
  const matches = normatives.filter(n=>
    n.parameter===parameter &&
    (!n.sport||n.sport.toLowerCase()===sport?.toLowerCase()) &&
    (!n.gender||n.gender.toLowerCase()===gender?.toLowerCase()) &&
    (!n.age_min||age>=n.age_min) &&
    (!n.age_max||age<=n.age_max) &&
    value>=n.value_from && value<=n.value_to
  );
  return matches[0]?.score||null;
}

// ── NORMATIVE MANAGER ─────────────────────────────────────────────────────────
function NormativeManager({showToast}) {
  const [norms, setNorms] = useState([]);

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      let extra = "&order=parameter.asc,sport.asc,gender.asc,age_min.asc,value_from.asc";
      if(filters.parameter) extra+=`&parameter=ilike.*${filters.parameter}*`;
      if(filters.sport) extra+=`&sport=eq.${filters.sport}`;
      if(filters.gender) extra+=`&gender=eq.${filters.gender}`;
      if(filters.source) extra+=`&source=eq.${filters.source}`;
      const d = await db.get("normative_data", extra);
      setNorms(d||[]);
    } catch(e){showToast(e.message,"error");}
    setLoading(false);
  },[filters]);

  useEffect(()=>{load();setPage(0);},[load]);

  const handleCSVUpload = async(e) => {
    const file = e.target.files[0]; if(!file) return;
    setUploading(true);
    try {
      const text = await file.text();
      const lines = text.trim().split("\n");
      const headers = lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
      const rows = lines.slice(1).map(line=>{
        const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g)||[];
        const obj={};
        headers.forEach((h,i)=>obj[h]=(vals[i]||"").replace(/"/g,"").trim());
        return obj;
      });

      // Map CSV format to normative_data schema
      const records = rows.filter(r=>r['Value From']||r['Score']).map(r=>({
        parameter: r.Parameter||r.parameter||"VO2max",
        category: r.Category||r.category||"energy",
        sport: r.Sport||r.sport||null,
        gender: r.Gender||r.gender||null,
        age_min: parseNum(r['Age From']||r.age_min),
        age_max: parseNum(r['Age To']||r.age_max),
        value_from: parseNum(r['Value From']||r.value_from),
        value_to: parseNum(r['Value To']||r.value_to),
        score: parseInt(r.Score||r.score)||null,
        description_el: r['Description EL']||r.description_el||"",
        description_en: r['Description EN']||r.description_en||"",
        unit: r.Unit||r.unit||"",
        higher_is_better: (r['Higher Is Better']||r.higher_is_better||"true").toLowerCase()!=="false",
        source: r.Source||r.source||"international"
      }));

      // Insert in batches
      let inserted = 0;
      const batchSize = 50;
      for(let i=0;i<records.length;i+=batchSize){
        const batch = records.slice(i,i+batchSize);
        await fetch(`${SB_URL}/rest/v1/normative_data`,{
          method:"POST",headers:{...dbH(),Prefer:"return=minimal"},
          body:JSON.stringify(batch)
        });
        inserted+=batch.length;
      }
      showToast(`✅ ${inserted} normatives εισήχθησαν`);
      load();
    } catch(err){ showToast(err.message,"error"); }
    setUploading(false);
    e.target.value="";
  };

  const deleteRow = async(id)=>{
    if(!confirm("Διαγραφή;")) return;
    try { await db.del("normative_data",id); setNorms(n=>n.filter(x=>x.id!==id)); showToast("Διαγράφηκε"); }
    catch(e){ showToast(e.message,"error"); }
  };

  const saveEdit = async()=>{
    try {
      await db.patch("normative_data",editRow.id,editRow);
      setNorms(n=>n.map(x=>x.id===editRow.id?editRow:x));
      setEditRow(null); showToast("Αποθηκεύτηκε");
    } catch(e){ showToast(e.message,"error"); }
  };

  const params = [...new Set(norms.map(n=>n.parameter))].sort();
  const sports = [...new Set(norms.map(n=>n.sport).filter(Boolean))].sort();
  const paged = norms.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const totalPages = Math.ceil(norms.length/PAGE_SIZE);

  return html`
    <div>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div style=${{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Admin</div>

          </label>
          <${Btn} onClick=${()=>setEditRow({parameter:"",category:"energy",sport:"",gender:"",age_min:"",age_max:"",value_from:"",value_to:"",score:"",description_el:"",description_en:"",unit:"",higher_is_better:true,source:"international"})} color=${C.accent}>+ Νέα Εγγραφή<//>
        </div>
      </div>

      <!-- Import Info -->
      <${Card} style=${{marginBottom:16,background:"rgba(79,142,247,0.05)",border:`1px solid rgba(79,142,247,0.2)`}}>
        <div style=${{fontSize:12,color:C.muted}}>
          <strong style=${{color:C.accent}}>CSV Format:</strong> Value From, Value To, Age From, Age To, Gender, Sport, Description EL, Description EN, Score
          <span style=${{color:C.muted}}> — ή πρόσθεσε επιπλέον columns: Parameter, Category, Unit, Source</span>
        </div>
      <//>

      <!-- Filters -->
      <${Card} style=${{marginBottom:16,background:C.bg3}}>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          <div>
            <${Lbl} t="Παράμετρος"/>
            <input value=${filters.parameter} onInput=${e=>setFilters(f=>({...f,parameter:e.target.value}))} placeholder="π.χ. VO2max, CMJ..."/>
          </div>
          <div>
            <${Lbl} t="Άθλημα"/>
            <select value=${filters.sport} onChange=${e=>setFilters(f=>({...f,sport:e.target.value}))}>
              <option value="">Όλα</option>
              ${sports.map(s=>html`<option key=${s} value=${s}>${s}</option>`)}
            </select>
          </div>
          <div>
            <${Lbl} t="Φύλο"/>
            <select value=${filters.gender} onChange=${e=>setFilters(f=>({...f,gender:e.target.value}))}>
              <option value="">Όλα</option>
              <option value="Male">Άνδρας</option>
              <option value="Female">Γυναίκα</option>
            </select>
          </div>
          <div>
            <${Lbl} t="Πηγή"/>
            <select value=${filters.source} onChange=${e=>setFilters(f=>({...f,source:e.target.value}))}>
              <option value="">Όλες</option>
              <option value="international">International</option>
              <option value="cyprus">Cyprus</option>
            </select>
          </div>
        </div>
      <//>

      <!-- Table -->
      ${loading?html`<div style=${{textAlign:"center",padding:40}}><${Sp}/></div>`:html`
        <${Card} style=${{padding:0}}>
          <div style=${{overflowX:"auto"}}>
            <table>
              <thead><tr>
                <th>Παράμετρος</th><th>Κατηγορία</th><th>Άθλημα</th><th>Φύλο</th>
                <th>Ηλικία</th><th>Τιμές</th><th>Score</th><th>Αξιολόγηση</th>
                <th>Unit</th><th>Πηγή</th><th></th>
              </tr></thead>
              <tbody>${paged.map(n=>html`
                <tr key=${n.id}>

                  <td class="muted">${n.gender||"—"}</td>
                  <td class="muted" style=${{fontSize:11}}>${n.age_min}–${n.age_max}</td>
                  <td class="mono" style=${{fontSize:11}}>${n.value_from}–${n.value_to}</td>
                  <td style=${{textAlign:"center"}}><${Bdg} txt=${n.score} color=${n.score>=4?"green":n.score>=3?"yellow":"red"}/></td>
                  <td style=${{fontSize:11}}>${n.description_el||"—"}</td>
                  <td class="muted" style=${{fontSize:11}}>${n.unit||"—"}</td>
                  <td><${Bdg} txt=${n.source||"—"} color=${n.source==="cyprus"?"green":"muted"}/></td>
                  <td style=${{whiteSpace:"nowrap"}}>
                    <button onClick=${()=>setEditRow({...n})} style=${{background:C.bg3,color:C.accent,border:"none",borderRadius:4,padding:"3px 8px",cursor:"pointer",fontSize:11,marginRight:4}}>✏️</button>

// ── ASSESSMENT UPLOAD ─────────────────────────────────────────────────────────
function AssessmentUpload({showToast}) {
  const [file, setFile] = useState(null);
  const [parsed, setParsed] = useState([]);
  const [parsing, setParsing] = useState(false);
  const [saving, setSaving] = useState(false);
  const [teams, setTeams] = useState([]);
  const [sports, setSports] = useState([]);
  const [meta, setMeta] = useState({test_name:"",test_date:new Date().toISOString().split("T")[0],team_id:"",sport_id:"",examiner:"",notes:""});
  const sm=(k,v)=>setMeta(p=>({...p,[k]:v}));

  useEffect(()=>{
    db.get("teams","&order=name.asc").then(d=>setTeams(d||[]));
    db.get("sports","&order=name.asc").then(d=>setSports(d||[]));
  },[]);

  const handleFile = async(e) => {
    const f = e.target.files[0]; if(!f) return;
    setFile(f); setParsing(true);
    try {
      let rows=[];
      if(f.name.endsWith('.csv')) {
        const text = await f.text();
        const lines = text.trim().split("\n");
        const headers = lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
        rows = lines.slice(1).map(line=>{
          const vals = [];
          let inQ=false, cur="";
          for(const ch of line+","){
            if(ch==='"'){inQ=!inQ;}
            else if(ch===","&&!inQ){vals.push(cur.trim());cur="";}
            else cur+=ch;
          }
          const obj={};
          headers.forEach((h,i)=>obj[h]=vals[i]||"");
          return obj;
        });
      } else {
        const buf = await f.arrayBuffer();
        const wb = XLSX.read(buf);
        rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{raw:false});
      }
      const data = parseFileData(rows.filter(r=>Object.values(r).some(v=>v)));
      setParsed(data);
      if(data[0]?.test_date) sm("test_date", data[0].test_date);
    } catch(err){ showToast("Σφάλμα: "+err.message,"error"); }
    setParsing(false);
  };

  const saveAssessment = async() => {
    if(!parsed.length) return;
    setSaving(true);
    try {
      // Create assessment session
      const assessment = await db.post("assessments",{
        test_name: meta.test_name||file?.name,
        test_date: meta.test_date,
        team_id: meta.team_id||null,
        sport_id: meta.sport_id||null,
        examiner: meta.examiner,
        notes: meta.notes
      });

      let saved=0, errors=0;
      for(const row of parsed) {
        try {
          // Find athlete by ID number or name
          let athlete = null;
          if(row.id_number) {
            const found = await db.get("athletes",`&id_number=eq.${encodeURIComponent(row.id_number)}`);
            athlete = found?.[0]||null;
          }
          if(!athlete && (row.first_name||row.last_name)) {
            const name = `${row.last_name} ${row.first_name}`.trim();
            const found = await db.get("athletes",`&name=ilike.*${encodeURIComponent(name)}*`);
            athlete = found?.[0]||null;
          }
          // Save result
          await db.post("assessment_results",{
            assessment_id: assessment.id,
            athlete_id: athlete?.id||null,
            anthropometry: row.anthropometry,
            fitness: row.fitness,
            energy: row.energy,
            raw_data: {
              id_number:row.id_number,
              first_name:row.first_name,
              last_name:row.last_name,
              dob:row.dob,
              notes:row.notes
            }
          });
          saved++;
        } catch(e){ errors++; }
      }
      showToast(`✅ ${saved} αθλητές αποθηκεύτηκαν${errors?` (${errors} σφάλματα)`:""}`);
      setParsed([]); setFile(null);
    } catch(err){ showToast(err.message,"error"); }
    setSaving(false);
  };

  return html`
    <div>
      <div style=${{marginBottom:20}}>
        <div style=${{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Νέο</div>
        <div style=${{fontSize:22,fontWeight:700}}>Upload Assessment</div>
      </div>

      <${Card} style=${{marginBottom:16}}>
        <${Sec} t="Στοιχεία Session"/>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
          <div style=${{gridColumn:"1/-1"}}><${Lbl} t="Τίτλος Assessment"/><input value=${meta.test_name} onInput=${e=>sm("test_name",e.target.value)} placeholder="π.χ. Easter Camp 2026 — AEL"/></div>
          <div><${Lbl} t="Ημερομηνία"/><input type="date" value=${meta.test_date} onInput=${e=>sm("test_date",e.target.value)}/></div>
          <div><${Lbl} t="Ομάδα"/><select value=${meta.team_id} onChange=${e=>sm("team_id",e.target.value)}><option value="">— Επιλογή —</option>${teams.map(t=>html`<option key=${t.id} value=${t.id}>${t.name}</option>`)}</select></div>
          <div><${Lbl} t="Άθλημα"/><select value=${meta.sport_id} onChange=${e=>sm("sport_id",e.target.value)}><option value="">— Επιλογή —</option>${sports.map(s=>html`<option key=${s.id} value=${s.id}>${s.name}</option>`)}</select></div>
          <div><${Lbl} t="Εξεταστής"/><input value=${meta.examiner} onInput=${e=>sm("examiner",e.target.value)} placeholder="Όνομα εξεταστή"/></div>
          <div style=${{gridColumn:"2/-1"}}><${Lbl} t="Σημειώσεις"/><input value=${meta.notes} onInput=${e=>sm("notes",e.target.value)}/></div>
        </div>
      <//>

      <${Card} style=${{marginBottom:16}}>
        <${Sec} t="Upload CSV / Excel"/>
        ${!parsed.length?html`
          <label style=${{display:"block",border:`2px dashed ${C.border}`,borderRadius:8,padding:32,textAlign:"center",cursor:"pointer",color:C.muted}}>
            ${parsing?html`<${Sp}/><div style=${{marginTop:8}}>Ανάλυση αρχείου...</div>`:html`
              <div style=${{fontSize:36}}>📊</div>
              <div style=${{marginTop:8,fontWeight:600}}>Κλικ για επιλογή αρχείου</div>
              <div style=${{fontSize:11,marginTop:4}}>CSV ή Excel (.xlsx) — Format: Team_0_Ergometric_Results</div>
            `}
            <input type="file" accept=".csv,.xlsx,.xls" onChange=${handleFile} style=${{display:"none"}}/>
          </label>
        `:html`
          <div>
            <div style=${{color:C.green,fontWeight:600,marginBottom:12}}>✅ ${parsed.length} αθλητές αναλύθηκαν από ${file?.name}</div>
            <div style=${{overflowX:"auto",marginBottom:16}}>
              <table><thead><tr><th>#</th><th>Όνομα</th><th>ID</th><th>Ημ. Γέννησης</th><th>Ανθρωπομετρία</th><th>Φυσικές</th><th>Ενεργειακά</th></tr></thead>
              <tbody>${parsed.map((r,i)=>html`
                <tr key=${i}>
                  <td class="muted">${i+1}</td>
                  <td style=${{fontWeight:600}}>${r.last_name} ${r.first_name}</td>
                  <td class="muted mono" style=${{fontSize:11}}>${r.id_number||"—"}</td>
                  <td class="muted" style=${{fontSize:11}}>${r.dob||"—"}</td>
                  <td><span style=${{fontSize:10,color:C.muted}}>${Object.keys(r.anthropometry).filter(k=>r.anthropometry[k]!==null).length} πεδία</span></td>
                  <td><span style=${{fontSize:10,color:C.muted}}>${Object.keys(r.fitness).filter(k=>r.fitness[k]!==null).length} πεδία</span></td>
                  <td><span style=${{fontSize:10,color:C.muted}}>${Object.keys(r.energy).filter(k=>r.energy[k]!==null).length} πεδία</span></td>
                </tr>
              `)}</tbody></table>
            </div>
            <div style=${{display:"flex",gap:10}}>
              <${Btn} onClick=${saveAssessment} disabled=${saving} color=${C.green} textColor="#0d0f14">${saving?html`<${Sp}/>`:"💾"} Αποθήκευση Assessment<//>
              <${Btn} onClick=${()=>{setParsed([]);setFile(null);}} color=${C.bg3} textColor=${C.muted}>✕ Νέο Αρχείο<//>
            </div>
          </div>
        `}
      <//>
    </div>`;
}
